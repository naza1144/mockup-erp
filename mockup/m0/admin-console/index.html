<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M0 · Admin Console — Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } html, body { height: 100%; margin: 0; } iframe { border: 0; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex flex-col h-screen">
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10 shrink-0">
    <div class="flex items-center gap-3">
      <a href="../../main%20page/index.html" class="text-sm text-gray-500 hover:text-gray-700">← กลับหน้าหลัก</a>
      <span class="w-7 h-7 rounded-lg bg-slate-100 text-slate-700 flex items-center justify-center font-bold text-xs">M0</span>
      <span class="font-semibold text-sm">ERP บริหารหลักสูตร · จัดการผู้ใช้งาน (Admin Console)</span>
    </div>
    <span class="text-xs text-gray-500">เข้าสู่ระบบในฐานะ: <span class="font-semibold text-gray-700">ผู้ดูแลระบบ (จำลอง — เห็นเฉพาะ role admin)</span></span>
  </header>

  <div class="flex flex-1 min-h-0">
    <nav class="w-56 bg-white border-r border-gray-200 p-3 shrink-0 space-y-0.5 overflow-y-auto">
      <p class="px-2 py-1 text-[11px] uppercase tracking-wide text-gray-400">เมนู</p>
      <a id="menu-list" data-page="list" href="pages/page-list.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">รายการบัญชีผู้ใช้</a>
      <a id="menu-audit" data-page="audit" href="pages/page-audit.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">Audit Log</a>
    </nav>

    <iframe id="main-frame" name="main-frame" src="pages/page-list.html" class="flex-1 w-full h-full"></iframe>
  </div>

  <footer class="text-center py-3 border-t border-gray-200 bg-white shrink-0">
    <button onclick="resetData()" class="text-xs text-gray-400 hover:text-red-600 underline">รีเซ็ตข้อมูลตัวอย่าง</button>
  </footer>
</div>

<script src="shared.js"></script>
<script>
/* ═══ Shell router: ไฮไลต์เมนูตามหน้าที่ iframe แจ้งมา ═══ */
function setActiveMenu(pageKey) {
  document.querySelectorAll(".menu-link").forEach((el) => {
    const on = el.dataset.page === pageKey;
    el.classList.toggle("bg-slate-100", on); el.classList.toggle("text-slate-700", on); el.classList.toggle("font-semibold", on);
  });
}
window.addEventListener("message", (ev) => {
  if (ev.data && ev.data.type === "m0-admin-page") setActiveMenu(ev.data.page);
});

/* resetData() ก็มีตัวจริงใน shared.js — ประกาศซ้ำที่นี่ (identical) เพื่อให้ footer ในหน้านี้เรียกใช้ได้ตรง ๆ */
function resetData() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
