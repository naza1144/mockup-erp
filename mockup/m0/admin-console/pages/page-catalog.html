<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M0 Admin Console · Role Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ ROLE_CATALOG — UC-08 ═══ -->
<div class="max-w-4xl">
  <a id="back-link" href="page-assign.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับไปหน้ากำหนด Role</a>
  <h1 class="text-2xl font-bold mb-4">Role Catalog</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden mb-4">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
        <tr><th class="text-left px-4 py-3">Role Code</th><th class="text-left px-4 py-3">ชื่อ</th>
            <th class="text-left px-4 py-3">คำอธิบาย</th><th class="text-left px-4 py-3">จำนวนผู้ใช้</th><th class="text-left px-4 py-3">สร้างเมื่อ</th><th class="px-4 py-3"></th></tr>
      </thead>
      <tbody id="catalog-rows"></tbody>
    </table>
  </div>
  <p id="catalog-error" class="text-xs text-red-600 hidden mb-2"></p>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 flex gap-2 max-w-2xl">
    <input id="rc-code" placeholder="role_code เช่น lab_manager" class="border border-gray-300 rounded-lg px-2 py-1.5 text-sm w-40">
    <input id="rc-name" placeholder="ชื่อ" class="border border-gray-300 rounded-lg px-2 py-1.5 text-sm w-40">
    <input id="rc-desc" placeholder="คำอธิบาย" class="border border-gray-300 rounded-lg px-2 py-1.5 text-sm flex-1">
    <button onclick="addRole()" class="bg-slate-600 hover:bg-slate-700 text-white text-sm rounded-lg px-3">เพิ่ม Role</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let roles = loadData("m0_admin_roles", seedRoles);
let accounts = loadData("m0_admin_accounts", seedAccounts);
const id = new URLSearchParams(location.search).get("id");

function roleName(code) { const r = roles.find((x) => x.code === code); return r ? r.name : code; }

/* ═══ UC-08 — Role Catalog · ปฏิเสธลบ role ที่มีผู้ใช้ผูกอยู่ ═══ */
function addRole() {
  const code = document.getElementById("rc-code").value.trim();
  const name = document.getElementById("rc-name").value.trim();
  const desc = document.getElementById("rc-desc").value.trim();
  const err = document.getElementById("catalog-error");
  if (!code || !name) { err.textContent = "กรอก role_code และชื่อให้ครบ"; err.classList.remove("hidden"); return; }
  if (roles.some((r) => r.code === code)) { err.textContent = "role_code นี้มีอยู่แล้ว"; err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  const now = new Date().toISOString();
  roles.push({ code, name, desc, created_at: now, updated_at: now });
  saveData("m0_admin_roles", roles);
  document.getElementById("rc-code").value = ""; document.getElementById("rc-name").value = ""; document.getElementById("rc-desc").value = "";
  render();
}
function deleteRole(code) {
  const err = document.getElementById("catalog-error");
  const boundCount = accounts.filter((a) => a.roles.some((r) => r.code === code)).length;
  if (boundCount > 0) {
    err.textContent = `ลบไม่ได้ — มี ${boundCount} บัญชีผูก role "${roleName(code)}" อยู่ ต้อง revoke จากทุกบัญชีก่อน (Alternative Flow UC-08)`;
    err.classList.remove("hidden"); return;
  }
  err.classList.add("hidden");
  roles = roles.filter((r) => r.code !== code); saveData("m0_admin_roles", roles); render();
}

function render() {
  document.getElementById("catalog-rows").innerHTML = roles.map((r) => {
    const bound = accounts.filter((a) => a.roles.some((gr) => gr.code === r.code)).length;
    return `<tr class="border-t border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-3 font-mono text-xs">${r.code}</td>
      <td class="px-4 py-3 font-semibold">${r.name}</td>
      <td class="px-4 py-3 text-gray-500">${r.desc}</td>
      <td class="px-4 py-3">${bound}</td>
      <td class="px-4 py-3 text-xs text-gray-400">${new Date(r.created_at).toLocaleDateString("th-TH")}</td>
      <td class="px-4 py-3 text-right"><button onclick="deleteRole('${r.code}')" class="text-red-600 hover:bg-red-50 rounded-lg px-2 py-1 text-xs">ลบ</button></td>
    </tr>`;
  }).join("");
}

function init() {
  document.getElementById("back-link").href = "page-assign.html?id=" + encodeURIComponent(id);
  render();
  notifyParentPage("catalog");
}
</script>
</body>
</html>
