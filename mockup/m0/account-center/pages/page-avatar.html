<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M0 Account Center · อัปโหลดรูปโปรไฟล์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ UPLOAD_AVATAR — UC-06 ═══ -->
<div class="max-w-2xl">
  <a href="page-edit.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับแก้ไขโปรไฟล์</a>
  <h1 class="text-2xl font-bold mb-4">อัปโหลดรูปโปรไฟล์</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-md space-y-4">
    <div class="flex items-center gap-4">
      <img id="av-preview" src="" alt="ตัวอย่างรูปโปรไฟล์" class="w-20 h-20 rounded-full object-cover bg-gray-100 border border-gray-200">
      <div>
        <input type="file" id="av-file" accept="image/png,image/jpeg" onchange="pickAvatar()"
               class="text-sm">
        <p class="text-xs text-gray-500 mt-1">รองรับ .jpg / .png ขนาดไม่เกิน 2MB</p>
      </div>
    </div>
    <p id="av-error" class="text-xs text-red-600 hidden"></p>
    <button onclick="saveAvatar()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึกรูป</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let me = loadData("m0_ac_me", seedMe);

/* ═══ UC-06 — validate ≤2MB, jpg/png ผ่าน FileReader (simulate ตาม guide §7) ═══ */
function pickAvatar() {
  const input = document.getElementById("av-file");
  const err = document.getElementById("av-error");
  const file = input.files[0];
  if (!file) return;
  if (!["image/jpeg", "image/png"].includes(file.type)) {
    err.textContent = "รองรับเฉพาะไฟล์ .jpg / .png เท่านั้น"; err.classList.remove("hidden"); input.value = ""; return;
  }
  if (file.size > 2 * 1024 * 1024) {
    err.textContent = "ไฟล์ใหญ่เกิน 2MB — กรุณาเลือกไฟล์ที่เล็กกว่านี้"; err.classList.remove("hidden"); input.value = ""; return;
  }
  err.classList.add("hidden");
  const reader = new FileReader();
  reader.onload = (e) => { me.pendingAvatar = e.target.result; document.getElementById("av-preview").src = e.target.result; };
  reader.readAsDataURL(file);
}
function saveAvatar() {
  if (!me.pendingAvatar) { document.getElementById("av-error").textContent = "เลือกไฟล์ก่อนบันทึก"; document.getElementById("av-error").classList.remove("hidden"); return; }
  /* ระบบจริง: POST /accounts/{id}/avatar → M10 Storage bucket account-avatars → MinIO object path → คืน presigned URL (BR-M0-006) */
  /* จำลอง presigned URL: bucket = account-avatars, object path = account_id/avatar.jpg, expires = 3600s */
  const bucket = "account-avatars";
  const objectPath = me.account_id + "/avatar.jpg";
  const expires = 3600;
  const presignedUrl = `https://minio.erp.ubu.ac.th/${bucket}/${objectPath}?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=erp-internal%2F2026%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Expires=${expires}&X-Amz-Signature=signed-by-m0-service`;
  console.log("🔗 Presigned URL (จำลอง):", presignedUrl);
  me.avatar_url = me.pendingAvatar; me.pendingAvatar = null;
  saveData("m0_ac_me", me);
  alert("อัปโหลดรูปสำเร็จ (จำลอง)\n\n• Bucket: " + bucket + "\n• Object path (MinIO): " + objectPath + "\n• Presigned URL TTL: " + expires + "s\n• ระบบจริง: คืน presigned URL ทุก request (BR-M0-006)");
  window.location.href = "page-edit.html";
}

function init() {
  document.getElementById("av-preview").src = me.pendingAvatar || me.avatar_url;
  notifyParentPage("avatar");
}
</script>
</body>
</html>
