<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M0 Account Center · แก้ไข Extended Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ EDIT_PROFILE — UC-05 ═══ -->
<div class="max-w-2xl">
  <a href="page-view.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับโปรไฟล์ของฉัน</a>
  <h1 class="text-2xl font-bold mb-4">แก้ไข Extended Profile</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 space-y-4">
    <div class="flex items-center gap-4">
      <img id="edit-avatar" src="" alt="รูปโปรไฟล์" class="w-16 h-16 rounded-full object-cover bg-gray-100 border border-gray-200">
      <a href="page-avatar.html" class="text-sm text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-1.5">เปลี่ยนรูปโปรไฟล์</a>
    </div>

    <div class="border border-gray-200 rounded-xl p-4 bg-gray-50">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">ข้อมูลชื่อ — แก้ไขโดยผู้ดูแลระบบเท่านั้น (BR-M0-003)</p>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-semibold text-gray-700">คำนำหน้า (ไทย)</label>
          <input id="ed-name-th-prefix" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ Admin แก้ผ่าน Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700">คำนำหน้า (อังกฤษ)</label>
          <input id="ed-name-en-prefix" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ Admin แก้ผ่าน Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-2">
        <div>
          <label class="text-sm font-semibold text-gray-700">ชื่อ (ไทย)</label>
          <input id="ed-name-th-first" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ Admin แก้ผ่าน Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700">นามสกุล (ไทย)</label>
          <input id="ed-name-th-last" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ Admin แก้ผ่าน Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-2">
        <div>
          <label class="text-sm font-semibold text-gray-700">ชื่อ (อังกฤษ)</label>
          <input id="ed-name-en-first" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ Admin แก้ผ่าน Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700">นามสกุล (อังกฤษ)</label>
          <input id="ed-name-en-last" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ Admin แก้ผ่าน Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
      </div>
    </div>
    <div>
      <label class="text-sm font-semibold text-gray-700">เบอร์โทร</label>
      <input id="ed-phone" class="w-full max-w-xs border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-blue-300">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm font-semibold text-gray-700">ภาษา</label>
        <select id="ed-lang" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1">
          <option value="th">ไทย</option><option value="en">English</option>
        </select>
      </div>
      <div>
        <label class="text-sm font-semibold text-gray-700">Timezone</label>
        <select id="ed-tz" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1">
          <option value="Asia/Bangkok">Asia/Bangkok (UTC+7)</option>
          <option value="UTC">UTC</option>
        </select>
      </div>
    </div>

    <div class="border-t border-gray-100 pt-4">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Field สงวน — ต้องให้ผู้ดูแลระบบแก้ (Alternative Flow UC-05)</p>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-semibold text-gray-700">สังกัดภาควิชา (dept_id)</label>
          <input id="ed-dept" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ผู้ดูแลระบบแก้ผ่าน M0 Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700">ประเภทบัญชี</label>
          <input id="ed-type" disabled title="แก้ไม่ได้จากหน้านี้ — ต้องให้ผู้ดูแลระบบแก้ผ่าน M0 Admin Console"
                 class="w-full border border-gray-200 bg-gray-100 text-gray-400 rounded-lg px-3 py-2 text-sm mt-1 cursor-not-allowed">
        </div>
      </div>
      <p class="text-xs text-gray-400 mt-1">ล็อกไว้เพื่อป้องกันแก้สิทธิ์ตัวเอง — ระบบจริงถ้าพยายามยิง PATCH ตรงจะได้ 403</p>
    </div>

    <p id="edit-error" class="text-xs text-red-600 hidden">กรอกชื่อ-นามสกุลให้ครบก่อนบันทึก</p>
    <button onclick="saveProfile()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึก</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let me = loadData("m0_ac_me", seedMe);

function fillEdit() {
  document.getElementById("ed-name-th-prefix").value = me.name_th_prefix || "";
  document.getElementById("ed-name-th-first").value = me.name_th_first;
  document.getElementById("ed-name-th-last").value = me.name_th_last;
  document.getElementById("ed-name-en-prefix").value = me.name_en_prefix || "";
  document.getElementById("ed-name-en-first").value = me.name_en_first || "";
  document.getElementById("ed-name-en-last").value = me.name_en_last || "";
  document.getElementById("ed-phone").value = me.phone;
  document.getElementById("ed-lang").value = me.lang;
  document.getElementById("ed-tz").value = me.tz;
  document.getElementById("ed-dept").value = me.dept_name;
  document.getElementById("ed-type").value = TYPE_TH[me.type];
  document.getElementById("edit-avatar").src = me.avatar_url;
}

/* ═══ UC-05 — User แก้ไขได้เฉพาะ phone, lang, timezone, avatar (BR-M0-003) ═══ */
function saveProfile() {
  const err = document.getElementById("edit-error");
  err.classList.add("hidden");
  /* ระบบจริง: PATCH /accounts/{id}/profile — field สงวน (ชื่อ, dept, type, email) ถูกฝั่ง backend ปฏิเสธ 403 */
  me.phone = document.getElementById("ed-phone").value;
  me.lang = document.getElementById("ed-lang").value;
  me.tz = document.getElementById("ed-tz").value;
  saveData("m0_ac_me", me);
  alert("บันทึกโปรไฟล์แล้ว (จำลอง audit log ผ่าน M10)");
  window.location.href = "page-view.html";
}

function init() {
  fillEdit();
  notifyParentPage("edit");
}
</script>
</body>
</html>
