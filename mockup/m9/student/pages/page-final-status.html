<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 นักศึกษา · สถานะคำขอสอบจบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ RequestFinalExam (result view) — UC-15 ═══ -->
<div>
  <a href="page-milestone.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">สถานะคำขอสอบจบ</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
    <p class="text-sm mb-3">สถานะ: <span id="fe-status" class="font-semibold"></span></p>
    <button onclick="advanceFinalStage()" class="text-sm text-pink-700 hover:bg-pink-50 rounded-lg px-3 py-1.5 border border-pink-200">▶ จำลองความคืบหน้า (ถัดไป)</button>
    <p class="text-xs text-gray-400 mt-3">หมายเหตุ: การจัดสอบจบจริงเกิดใน Staff/Committee App (คนละแอป) ปุ่มนี้จำลองผลเพื่อสาธิตเท่านั้น</p>
  </div>
  <a id="fe-submit-doc-btn" href="page-submit-doc.html" class="hidden mt-4 inline-block bg-pink-600 hover:bg-pink-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ส่งเล่มฉบับสมบูรณ์</a>
</div>

<script src="../shared.js"></script>
<script>
let thesis = loadData("m9_st_thesis", null);
const FE_TH = { REQUESTED: "ส่งคำขอแล้ว รอที่ปรึกษาจัดสอบ", SCHEDULED: "จัดสอบแล้ว รอวันสอบ", PASSED: "สอบผ่านแล้ว — ส่งเล่มได้" };

function advanceFinalStage() {
  if (thesis.finalStage === "REQUESTED") thesis.finalStage = "SCHEDULED";
  else if (thesis.finalStage === "SCHEDULED") thesis.finalStage = "PASSED";
  saveData("m9_st_thesis", thesis); render();
}
function render() {
  document.getElementById("fe-status").textContent = thesis.finalStage ? FE_TH[thesis.finalStage] : "ยังไม่ได้ขอสอบจบ";
  document.getElementById("fe-submit-doc-btn").classList.toggle("hidden", thesis.finalStage !== "PASSED");
}

function init() { render(); notifyParentPage("final-status"); }
</script>
</body>
</html>
