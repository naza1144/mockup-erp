<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 นักศึกษา · นัดพบที่ปรึกษา</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ BookAppointment — UC-13 ═══ -->
<div>
  <a href="page-milestone.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">นัดพบที่ปรึกษา</h1>
  <p class="text-xs text-gray-400 mb-3">reuse ระบบ Office Hours ของ M3 · GET /office-hours?instructor=&available=true</p>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-md space-y-3">
    <div id="ap-slots" class="grid grid-cols-2 gap-2"></div>
    <div><label class="text-sm font-semibold text-gray-700">หัวข้อที่ต้องการปรึกษา</label>
      <input id="ap-topic" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></div>
    <p id="ap-error" class="text-xs text-red-600 hidden"></p>
    <button onclick="confirmAppointment()" class="bg-pink-600 hover:bg-pink-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ยืนยันจอง</button>
  </div>
  <div id="ap-mine" class="mt-4 text-sm"></div>
</div>

<script src="../shared.js"></script>
<script>
const officeSlots = ["จ 20 ก.ค. 13:00-13:30", "จ 20 ก.ค. 13:30-14:00", "พ 22 ก.ค. 09:00-09:30", "พ 22 ก.ค. 09:30-10:00"];
let chosenSlot = null;
let myAppointments = loadData("m9_st_appointments", []);

function renderSlots() {
  document.getElementById("ap-slots").innerHTML = officeSlots.map((s) => `
    <button onclick="pickSlot('${s}')" class="text-xs border rounded-lg px-2 py-2 text-left
      ${chosenSlot === s ? "bg-pink-100 border-pink-300 text-pink-700 font-semibold" : "border-gray-300 hover:bg-gray-50"}">${s}</button>`).join("");
}
function pickSlot(s) { chosenSlot = s; renderSlots(); }
function confirmAppointment() {
  const err = document.getElementById("ap-error");
  const topic = document.getElementById("ap-topic").value.trim();
  if (!chosenSlot || !topic) { err.textContent = "เลือกช่วงเวลาและกรอกหัวข้อที่ต้องการปรึกษาก่อนยืนยัน"; err.classList.remove("hidden"); return; }
  /* Alt Flow UC-13: จำลอง race condition — slot ถูกจองไปแล้วก่อนยืนยัน ~20% */
  if (Math.random() < 0.2) {
    err.textContent = `ช่วงเวลา "${chosenSlot}" เพิ่งถูกจองไปแล้ว — กรุณาเลือกช่วงเวลาใหม่`; err.classList.remove("hidden");
    chosenSlot = null; renderSlots(); return;
  }
  err.classList.add("hidden");
  /* ระบบจริง: POST /appointments (M3 Office Hours) */
  myAppointments.push({ slot: chosenSlot, topic });
  saveData("m9_st_appointments", myAppointments);
  chosenSlot = null; document.getElementById("ap-topic").value = "";
  alert("ยืนยันการจองนัดหมายแล้ว"); renderMine();
}
function renderMine() {
  document.getElementById("ap-mine").innerHTML = myAppointments.length
    ? `<p class="font-semibold mb-1">นัดหมายของฉัน</p>` + myAppointments.map((a) => `<p class="text-xs text-gray-500">${a.slot} — ${a.topic}</p>`).join("")
    : "";
}

function init() { renderSlots(); renderMine(); notifyParentPage("appointment"); }
</script>
</body>
</html>
