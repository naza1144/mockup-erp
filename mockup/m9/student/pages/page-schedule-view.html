<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 นักศึกษา · แผนการสอบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ ViewExamSchedule — UC-23 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">แผนการสอบ</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
        <tr><th class="text-left px-4 py-3">หัวข้อ</th><th class="text-left px-4 py-3">ประเภท</th><th class="text-left px-4 py-3">วันเวลา</th><th class="text-left px-4 py-3">ระยะเวลา</th><th class="text-left px-4 py-3">รูปแบบ</th><th class="text-left px-4 py-3">ห้อง</th><th class="text-left px-4 py-3">กรรมการ (บทบาท)</th></tr>
      </thead>
      <tbody id="sv-rows"></tbody>
    </table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
function init() {
  document.getElementById("sv-rows").innerHTML = seedDefenses.map((d) => `
    <tr class="border-t border-gray-100">
      <td class="px-4 py-3">${d.title}</td>
      <td class="px-4 py-3 text-gray-500">${DEFENSE_TYPE_TH[d.type] || d.type}</td>
      <td class="px-4 py-3 font-mono text-xs">${d.datetime}</td>
      <td class="px-4 py-3">${d.duration || 120} นาที</td>
      <td class="px-4 py-3">${MODE_TH[d.mode] || d.mode}</td>
      <td class="px-4 py-3">${d.room}</td>
      <td class="px-4 py-3 text-gray-500">${d.committee.map((c) => c.name + " (" + COMMITTEE_ROLE_TH[c.role] + ")").join(", ")}</td>
    </tr>`).join("") || `<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">ไม่มีข้อมูล</td></tr>`;
  notifyParentPage("schedule-view");
}
</script>
</body>
</html>
