<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 นักศึกษา · ส่งเล่มฉบับสมบูรณ์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ SubmitFinalDoc — UC-19 ═══ -->
<div>
  <a href="page-final-status.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">ส่งเล่มฉบับสมบูรณ์</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-md space-y-4">
    <div><label class="text-sm font-semibold text-gray-700">ประเภทเอกสาร (doc_type)</label>
      <select id="fd-doc-type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1">
        <option value="FULL_THESIS">FULL_THESIS — วิทยานิพนธ์ฉบับสมบูรณ์</option>
        <option value="REVISION">REVISION — ฉบับแก้ไข</option>
      </select>
    </div>
    <input type="file" id="fd-file" accept=".pdf" onchange="pickFinalDoc()" class="text-sm">
    <p class="text-xs text-gray-500">รองรับเฉพาะ .pdf · version เพิ่มอัตโนมัติ (DD-M9-005)</p>
    <p id="fd-error" class="text-xs text-red-600 hidden"></p>
    <button onclick="saveFinalDoc()" class="bg-pink-600 hover:bg-pink-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ส่งเล่ม</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let thesis = loadData("m9_st_thesis", null);
let pickedFinalDoc = null;

function pickFinalDoc() {
  const input = document.getElementById("fd-file");
  const err = document.getElementById("fd-error");
  const file = input.files[0];
  if (!file) return;
  if (!file.name.toLowerCase().endsWith(".pdf")) { err.textContent = "รองรับเฉพาะไฟล์ .pdf เท่านั้น"; err.classList.remove("hidden"); pickedFinalDoc = null; input.value = ""; return; }
  err.classList.add("hidden"); pickedFinalDoc = file.name;
}
function saveFinalDoc() {
  const err = document.getElementById("fd-error");
  if (thesis.finalStage !== "PASSED") { err.textContent = "ยังไม่ผ่านสอบจบ — ไม่สามารถส่งเล่มได้ (Alternative Flow UC-19)"; err.classList.remove("hidden"); return; }
  if (!pickedFinalDoc) { err.textContent = "เลือกไฟล์ PDF ก่อนส่งเล่ม"; err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  const docType = document.getElementById("fd-doc-type").value;
  const newVersion = (thesis.documents.filter((d) => d.doc_type === docType).length || 0) + 1;
  thesis.finalDoc = pickedFinalDoc;
  thesis.documents.push({ doc_type: docType, version: newVersion, original_filename: pickedFinalDoc, uploaded_by: "นักศึกษา", uploaded_at: new Date().toISOString() });
  saveData("m9_st_thesis", thesis);
  window.location.href = "page-metadata.html";
}

function init() { notifyParentPage("submit-doc"); }
</script>
</body>
</html>
