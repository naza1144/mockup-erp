<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 · โครงงาน/วิทยานิพนธ์ (กรรมการ/เจ้าหน้าที่) — Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } html, body { height: 100%; margin: 0; } iframe { border: 0; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex flex-col h-screen">
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10 shrink-0">
    <div class="flex items-center gap-3">
      <a href="../../main%20page/index.html" class="text-sm text-gray-500 hover:text-gray-700">← กลับหน้าหลัก</a>
      <span class="w-7 h-7 rounded-lg bg-pink-100 text-pink-700 flex items-center justify-center font-bold text-xs">M9</span>
      <span class="font-semibold text-sm">ERP บริหารหลักสูตร · โครงงาน/วิทยานิพนธ์ (กรรมการ/เจ้าหน้าที่)</span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="if (confirm('รีเซ็ตข้อมูลทั้งหมดกลับเป็นค่าเริ่มต้นใช่หรือไม่?')) resetData()" class="border border-rose-200 bg-rose-50 text-rose-700 rounded-lg px-3 py-1.5 text-sm font-semibold hover:bg-rose-100">รีเซ็ตข้อมูล</button>
      <label class="text-xs text-gray-500">บทบาท (จำลอง):</label>
      <select onchange="setRole(this.value)" id="roleSwitch" class="border border-gray-300 rounded-lg px-2 py-1 text-sm">
        <option value="course_manager">ผจก.รายวิชา (Course Manager)</option>
        <option value="committee">กรรมการสอบ (Committee)</option>
        <option value="advisor">อาจารย์ที่ปรึกษา (Advisor)</option>
      </select>
    </div>
  </header>

  <div class="flex flex-1 min-h-0">
    <nav class="w-60 bg-white border-r border-gray-200 p-3 shrink-0 space-y-0.5 overflow-y-auto">
      <p class="px-2 py-1 text-[11px] uppercase tracking-wide text-gray-400">เมนู</p>
      <a data-page="topics" data-roles="course_manager" href="pages/page-topics.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">รายการหัวข้อ</a>
      <a data-page="topic-history-review" data-roles="course_manager" href="pages/page-topic-history-review.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">ประวัติหัวข้อวิทยานิพนธ์</a>
      <a data-page="criteria" data-roles="course_manager" href="pages/page-criteria.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">กำหนดเกณฑ์ให้คะแนน</a>
      <a data-page="advisor-response" data-roles="advisor" href="pages/page-advisor-response.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">ตอบรับ/ปฏิเสธการรับเป็นที่ปรึกษา</a>
      <a data-page="availability" data-roles="committee" href="pages/page-availability.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">จัดการเวลาว่างสอบของฉัน</a>
      <a data-page="score" data-roles="committee" href="pages/page-score.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">ให้คะแนนสอบ</a>
      <a data-page="milestone-approve" data-roles="advisor" href="pages/page-milestone-approve.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">ตรวจสอบ Milestone + เอกสาร</a>
      <a data-page="schedule-view" data-roles="course_manager,committee,advisor" href="pages/page-schedule-view.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">ดูแผนการสอบ</a>
    </nav>

    <iframe id="main-frame" name="main-frame" src="pages/page-topics.html" class="flex-1 w-full h-full"></iframe>
  </div>
</div>

<script src="shared.js"></script>
<script>
function setActiveMenu(pageKey) {
  document.querySelectorAll(".menu-link").forEach((el) => {
    const on = el.dataset.page === pageKey;
    el.classList.toggle("bg-pink-50", on); el.classList.toggle("text-pink-700", on); el.classList.toggle("font-semibold", on);
  });
}
window.addEventListener("message", (ev) => {
  if (ev.data && ev.data.type === "m9-sc-page") setActiveMenu(ev.data.page);
});

function setRole(role) {
  localStorage.setItem("m9_sc_role", role);
  document.getElementById("roleSwitch").value = role;
  document.querySelectorAll("[data-roles]").forEach((el) => el.classList.toggle("hidden", !el.dataset.roles.split(",").includes(role)));
  const entry = { course_manager: "page-topics.html", committee: "page-availability.html", advisor: "page-advisor-response.html" };
  document.getElementById("main-frame").src = "pages/" + entry[role];
}

setRole(localStorage.getItem("m9_sc_role") ?? "course_manager");
</script>
</body>
</html>
