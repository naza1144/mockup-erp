<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 กรรมการ/เจ้าหน้าที่ · ประวัติหัวข้อวิทยานิพนธ์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ TopicHistoryReview — thesis_topic_history view ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">ประวัติหัวข้อวิทยานิพนธ์</h1>
  <p class="text-xs text-gray-500 mb-3">Append-only log — thesis_topic_history · REVOKE UPDATE/DELETE (BR-M9-006)</p>
  <div id="thr-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
function init() {
  const theses = loadData("m9_sc_theses", seedTheses);
  const thrRows = [];
  theses.forEach((t) => {
    (t.topicHistory || []).forEach((h) => {
      thrRows.push(`<div class="bg-white rounded-xl border border-gray-200 p-3">
        <div class="flex items-center justify-between">
          <p class="text-sm font-semibold">${t.student} — ${h.titleTh || "(ไม่มีหัวข้อ)"}</p>
          <span class="text-xs text-gray-400">${new Date(h.changed_at).toLocaleString("th-TH")}</span>
        </div>
        <p class="text-xs text-gray-500 mt-1">เหตุผล: ${h.reason} · โดย: ${h.changed_by}</p>
      </div>`);
    });
  });
  document.getElementById("thr-list").innerHTML = thrRows.join("") || `<p class="text-sm text-gray-400 text-center py-8">ไม่มีประวัติ</p>`;
  notifyParentPage("topic-history-review");
}
</script>
</body>
</html>
