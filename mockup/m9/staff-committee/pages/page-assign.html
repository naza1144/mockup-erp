<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 กรรมการ/เจ้าหน้าที่ · แต่งตั้งคณะกรรมการสอบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ AssignCommittee — UC-04 ═══ -->
<div>
  <a href="page-topics.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับรายการหัวข้อ</a>
  <h1 class="text-2xl font-bold mb-4">แต่งตั้งคณะกรรมการสอบ</h1>
  <p class="text-sm mb-3">หัวข้อ: <span id="ac-title" class="font-semibold"></span></p>
  <p class="text-xs text-gray-500 mb-3">กรรมการแต่ละคนต้องมีบทบาทใน <code>defense_committee.role</code>: CHAIR, MEMBER, EXTERNAL</p>
  <div id="ac-list" class="space-y-2 mb-3 max-w-lg"></div>
  <p id="ac-error" class="text-xs text-red-600 hidden mb-2"></p>
  <button onclick="saveCommittee()" class="bg-pink-600 hover:bg-pink-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึกกรรมการ</button>
</div>

<script src="../shared.js"></script>
<script>
let theses = loadData("m9_sc_theses", seedTheses);
const tid = Number(new URLSearchParams(location.search).get("tid"));
const target = theses.find((x) => x.id === tid);
let draftRoles = target ? { ...target.committeeRoles } : {};

function setCommitteeRole(id, role) {
  if (role) draftRoles[id] = role; else delete draftRoles[id];
  render();
}
function saveCommittee() {
  const err = document.getElementById("ac-error");
  const assigned = Object.keys(draftRoles);
  if (assigned.length < 2) { err.textContent = "ต้องเลือกกรรมการอย่างน้อย 2 คนตามระเบียบ"; err.classList.remove("hidden"); return; }
  if (!Object.values(draftRoles).includes("CHAIR")) { err.textContent = "ต้องมี CHAIR (ประธาน) อย่างน้อย 1 คน"; err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  target.committee = assigned.map(Number);
  target.committeeRoles = draftRoles;
  saveData("m9_sc_theses", theses);
  window.location.href = "page-availability.html?tid=" + tid;
}

function render() {
  document.getElementById("ac-title").textContent = target.title;
  document.getElementById("ac-list").innerHTML = mockInstructors.map((i) => {
    const conflict = target.advisorIds.includes(i.id);
    const currentRole = draftRoles[i.id] || "";
    return `<div class="border border-gray-200 rounded-lg px-3 py-2">
      <div class="flex items-center gap-2">
        <span class="font-semibold text-sm">${i.name}</span>
        ${conflict ? `<span class="text-amber-600 text-xs ml-auto">⚠ เป็นที่ปรึกษา — อาจมีผลประโยชน์ทับซ้อน</span>` : ""}
      </div>
      <div class="flex gap-2 mt-1">
        <label class="text-xs ${currentRole === "CHAIR" ? "text-pink-700 font-semibold" : "text-gray-500"}">
          <input type="radio" name="role-${i.id}" ${currentRole === "CHAIR" ? "checked" : ""} onchange="setCommitteeRole(${i.id},'CHAIR')"> ประธาน (CHAIR)</label>
        <label class="text-xs ${currentRole === "MEMBER" ? "text-pink-700 font-semibold" : "text-gray-500"}">
          <input type="radio" name="role-${i.id}" ${currentRole === "MEMBER" ? "checked" : ""} onchange="setCommitteeRole(${i.id},'MEMBER')"> กรรมการ (MEMBER)</label>
        <label class="text-xs text-gray-400">
          <input type="radio" name="role-${i.id}" ${!currentRole ? "checked" : ""} onchange="setCommitteeRole(${i.id},'')"> ไม่เป็นกรรมการ</label>
      </div>
    </div>`;
  }).join("");
}

function init() { render(); notifyParentPage("assign"); }
</script>
</body>
</html>
