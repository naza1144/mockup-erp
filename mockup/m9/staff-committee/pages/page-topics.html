<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 กรรมการ/เจ้าหน้าที่ · รายการหัวข้อ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ TopicReview — entry, UC-03 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">รายการหัวข้อโครงงาน/วิทยานิพนธ์</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
        <tr><th class="text-left px-4 py-3">นักศึกษา</th><th class="text-left px-4 py-3">หัวข้อ</th>
            <th class="text-left px-4 py-3">หลักสูตร</th><th class="text-left px-4 py-3">ปีการศึกษา</th>
            <th class="text-left px-4 py-3">สถานะ (<code>thesis.status</code>)</th><th class="text-left px-4 py-3">กรรมการ</th><th class="px-4 py-3"></th></tr>
      </thead>
      <tbody id="topics-rows"></tbody>
    </table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let theses = loadData("m9_sc_theses", seedTheses);

/* ═══ UC-03 — อนุมัติ/ตีกลับหัวข้อ ═══ */
function approveTopic(id) {
  const t = theses.find((x) => x.id === id); t.status = "APPROVED";
  t.topicHistory.push({ titleTh: t.title, titleEn: t.title, reason: "หัวข้อได้รับการอนุมัติ", changed_by: "ผจก.รายวิชา", changed_at: new Date().toISOString() });
  saveData("m9_sc_theses", theses); render();
}
function rejectTopic(id) {
  const comment = prompt("ระบุความเห็นประกอบการตีกลับ:");
  if (comment === null) return;
  const t = theses.find((x) => x.id === id); t.status = "REJECTED"; t.comment = comment || "กรุณาปรับปรุงหัวข้อ";
  t.topicHistory.push({ titleTh: t.title, titleEn: t.title, reason: "หัวข้อถูกตีกลับ: " + t.comment, changed_by: "ผจก.รายวิชา", changed_at: new Date().toISOString() });
  saveData("m9_sc_theses", theses); render();
}

function render() {
  document.getElementById("topics-rows").innerHTML = theses.map((t) => {
    const dueProposal = t.defenses.findIndex((d) => d.type === "PROPOSAL" && d.due);
    let actions = "";
    if (t.status === "SUBMITTED" || t.status === "TOPIC_SUBMITTED") actions = `<button onclick="approveTopic(${t.id})" class="text-green-700 hover:bg-green-50 rounded-lg px-2 py-1 text-xs">อนุมัติ</button>
      <button onclick="rejectTopic(${t.id})" class="text-red-600 hover:bg-red-50 rounded-lg px-2 py-1 text-xs">ตีกลับ</button>`;
    else if ((t.status === "APPROVED" || t.status === "TOPIC_APPROVED") && t.committee.length === 0) actions = `<a href="page-assign.html?tid=${t.id}" class="text-pink-700 hover:bg-pink-50 rounded-lg px-2 py-1 text-xs">แต่งตั้งกรรมการ</a>`;
    else if (dueProposal >= 0) actions = `<a href="page-proposal-result.html?tid=${t.id}" class="text-pink-700 hover:bg-pink-50 rounded-lg px-2 py-1 text-xs">บันทึกผลสอบเค้าโครง</a>`;
    else if (t.committee.length > 0) actions = `<span class="text-xs text-gray-400">กรรมการพร้อมแล้ว</span>`;
    return `<tr class="border-t border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-3">${t.student}</td><td class="px-4 py-3">${t.title}</td>
      <td class="px-4 py-3 text-gray-500 text-xs">${t.program || "-"}</td>
      <td class="px-4 py-3 text-gray-500 text-xs">${t.academicYear || "-"}</td>
      <td class="px-4 py-3"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-semibold ${STATUS_BADGE[t.status]}">${STATUS_TH[t.status] || t.status}</span></td>
      <td class="px-4 py-3 text-gray-500">${(t.committee || []).map((id) => instrName(id) + " (" + COMMITTEE_ROLE_TH[(t.committeeRoles || {})[id] || "MEMBER"] + ")").join(", ") || "-"}</td>
      <td class="px-4 py-3 text-right whitespace-nowrap space-x-1">${actions}</td></tr>`;
  }).join("");
}

function init() { render(); notifyParentPage("topics"); }
</script>
</body>
</html>
