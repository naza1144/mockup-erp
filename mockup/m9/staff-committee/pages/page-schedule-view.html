<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 กรรมการ/เจ้าหน้าที่ · แผนการสอบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ ViewExamSchedule — UC-23 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">แผนการสอบ</h1>
  <div class="flex gap-2 mb-4">
    <input id="sv-q" oninput="renderScheduleView()" placeholder="ค้นหาหัวข้อ/กรรมการ/ห้อง..." class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-72">
    <button onclick="alert('Export แผนการสอบเป็น PDF/iCal (จำลอง)')" class="text-sm text-pink-700 hover:bg-pink-50 rounded-lg px-3 py-1.5 border border-pink-200">Export PDF/iCal</button>
  </div>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
        <tr><th class="text-left px-4 py-3">หัวข้อ</th><th class="text-left px-4 py-3">ประเภท</th><th class="text-left px-4 py-3">วันเวลา</th><th class="text-left px-4 py-3">ระยะเวลา</th><th class="text-left px-4 py-3">รูปแบบ</th><th class="text-left px-4 py-3">ห้อง</th><th class="text-left px-4 py-3">กรรมการ (CHAIR/MEMBER/EXTERNAL)</th><th class="text-left px-4 py-3">สถานะ</th><th class="text-left px-4 py-3">ผล</th></tr>
      </thead>
      <tbody id="sv-rows"></tbody>
    </table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
const theses = loadData("m9_sc_theses", seedTheses);

function renderScheduleView() {
  const q = (document.getElementById("sv-q")?.value ?? "").toLowerCase();
  const rows = [];
  theses.forEach((t) => t.defenses.forEach((d) => {
    const committeeStr = (t.committee || []).map((id) => instrName(id) + " (" + COMMITTEE_ROLE_TH[(t.committeeRoles || {})[id] || "MEMBER"] + ")").join(", ");
    if (q && !(t.title.toLowerCase().includes(q) || d.room.toLowerCase().includes(q) || committeeStr.toLowerCase().includes(q))) return;
    rows.push(`<tr class="border-t border-gray-100">
      <td class="px-4 py-3">${t.title}</td>
      <td class="px-4 py-3">${DEFENSE_TYPE_TH[d.type] || d.type}</td>
      <td class="px-4 py-3 font-mono text-xs">${d.datetime}</td>
      <td class="px-4 py-3">${d.duration || 120} นาที</td>
      <td class="px-4 py-3">${MODE_TH[d.mode] || d.mode}</td>
      <td class="px-4 py-3">${d.room}</td>
      <td class="px-4 py-3 text-xs text-gray-500">${committeeStr}</td>
      <td class="px-4 py-3">${DEFENSE_STATUS_TH[d.status] || d.status}</td>
      <td class="px-4 py-3">${d.result ? RESULT_TH[d.result] || d.result : "—"}</td>
    </tr>`);
  }));
  document.getElementById("sv-rows").innerHTML = rows.join("") || `<tr><td colspan="9" class="px-4 py-8 text-center text-gray-400">ไม่มีข้อมูล</td></tr>`;
}

function init() { renderScheduleView(); notifyParentPage("schedule-view"); }
</script>
</body>
</html>
