<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M9 กรรมการ/เจ้าหน้าที่ · บันทึกผลสอบเค้าโครง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ RecordProposalResult — UC-09 ═══ -->
<div>
  <a href="page-topics.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับรายการหัวข้อ</a>
  <h1 class="text-2xl font-bold mb-4">บันทึกผลสอบเค้าโครง</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-lg space-y-4">
    <p class="text-sm">หัวข้อ: <span id="pr-title" class="font-semibold"></span></p>
    <p class="text-xs text-gray-500 mb-2">BR-M9-005: เฉพาะ CHAIR committee member เท่านั้นที่บันทึกผลได้ — ตรวจสอบ role ก่อนบันทึก</p>
    <div><label class="text-sm font-semibold text-gray-700">ผลการสอบ · <code>defense.result</code></label>
      <select id="pr-result" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1">
        <option value="PASS">ผ่าน (PASS)</option><option value="PASS_WITH_REVISION">ผ่านมีแก้ไข (PASS_WITH_REVISION)</option><option value="FAIL">ไม่ผ่าน (FAIL)</option>
      </select></div>
    <div><label class="text-sm font-semibold text-gray-700">ข้อเสนอแนะ</label>
      <textarea id="pr-comment" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></textarea></div>
    <button onclick="saveProposalResult()" class="bg-pink-600 hover:bg-pink-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึกผล (CHAIR only)</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let theses = loadData("m9_sc_theses", seedTheses);
const tid = Number(new URLSearchParams(location.search).get("tid"));
const target = theses.find((x) => x.id === tid);

function saveProposalResult() {
  const result = document.getElementById("pr-result").value;
  const comment = document.getElementById("pr-comment").value;
  /* BR-M9-005: ตรวจสอบว่า CHAIR committee member เท่านั้นที่ตั้ง result */
  const chairId = Object.entries(target.committeeRoles || {}).find(([, r]) => r === "CHAIR");
  if (!chairId) { alert("Alternative Flow: ไม่มี CHAIR committee — ไม่สามารถบันทึกผลได้"); return; }
  if (Number(chairId[0]) !== ME_INSTRUCTOR_ID) { alert("Alternative Flow BR-M9-005: เฉพาะ CHAIR เท่านั้นที่บันทึกผล — คุณไม่ใช่ CHAIR"); return; }
  const d = target.defenses.find((x) => x.type === "PROPOSAL" && x.due);
  d.result = result; d.due = false; d.status = "COMPLETED"; d.comment = comment;
  if (result === "FAIL") target.status = "TOPIC_REJECTED";
  else { target.status = "PROPOSAL_PASSED"; target.proposalResult = "PASSED"; }
  saveData("m9_sc_theses", theses);
  if (result === "FAIL") alert(`บันทึกผลแล้ว — ไม่ผ่าน (FAIL): thesis.status → TOPIC_REJECTED, แจ้งนักศึกษาให้ปรับปรุง`);
  else alert(`บันทึกผลแล้ว — ผ่าน (${result}): thesis.status → PROPOSAL_PASSED, เข้าสู่การติดตาม milestone`);
  window.location.href = "page-milestone-approve.html";
}

function init() { document.getElementById("pr-title").textContent = target.title; notifyParentPage("proposal-result"); }
</script>
</body>
</html>
