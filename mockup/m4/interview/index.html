<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M4 · Interview (Walk-in) — Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } html, body { height: 100%; margin: 0; } iframe { border: 0; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex flex-col h-screen">
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10 shrink-0">
    <div class="flex items-center gap-3">
      <a href="../../main%20page/index.html" class="text-sm text-gray-500 hover:text-gray-700">← กลับหน้าหลัก</a>
      <span class="w-7 h-7 rounded-lg bg-green-100 text-green-700 flex items-center justify-center font-bold text-xs">M4</span>
      <span class="font-semibold text-sm">ERP บริหารหลักสูตร · สัมภาษณ์ Walk-in (Interview Queue)</span>
    </div>
    <span class="text-xs text-gray-500">เข้าสู่ระบบในฐานะ: <span class="font-semibold text-gray-700">กรรมการสัมภาษณ์ (Interviewer)</span></span>
  </header>

  <div class="flex flex-1 min-h-0">
    <nav class="w-56 bg-white border-r border-gray-200 p-3 shrink-0 space-y-0.5 overflow-y-auto">
      <p class="px-2 py-1 text-[11px] uppercase tracking-wide text-gray-400">เมนู</p>
      <a data-page="queue" href="pages/page-queue.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">📋 คิวสัมภาษณ์</a>
      <a data-page="walkin" href="pages/page-walkin.html" target="main-frame" class="menu-link block w-full px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">➕ ลงทะเบียน Walk-in</a>
      <hr class="my-3 border-gray-100">
      <p class="px-2 py-1 text-[11px] uppercase tracking-wide text-gray-400">สถิติวันนี้</p>
      <div class="px-3 py-2 text-xs space-y-1 text-gray-500">
        <p>รอสัมภาษณ์: <span id="stat-waiting" class="font-semibold text-gray-700">0</span></p>
        <p>กำลังสัมภาษณ์: <span id="stat-interviewing" class="font-semibold text-blue-700">0</span></p>
        <p>สัมภาษณ์แล้ว: <span id="stat-done" class="font-semibold text-green-700">0</span></p>
      </div>
    </nav>

    <iframe id="main-frame" name="main-frame" src="pages/page-queue.html" class="flex-1 w-full h-full"></iframe>
  </div>
</div>

<script src="shared.js"></script>
<script>
function setActiveMenu(pageKey) {
  document.querySelectorAll(".menu-link").forEach((el) => {
    const on = el.dataset.page === pageKey;
    el.classList.toggle("bg-green-50", on); el.classList.toggle("text-green-700", on); el.classList.toggle("font-semibold", on);
  });
}
/* คำนวณสถิติวันนี้จากคิวใน localStorage (เทียบ render() ส่วน stats เดิมที่เคยอยู่ในหน้าเดียวกับ sidebar) */
function refreshStats() {
  const queue = loadData("m4_interview_queue", []);
  document.getElementById("stat-waiting").textContent = queue.filter((a) => a.status === "WAITING").length;
  document.getElementById("stat-interviewing").textContent = queue.some((a) => a.status === "CALLED") ? 1 : 0;
  document.getElementById("stat-done").textContent = queue.filter((a) => a.status === "DONE").length;
}
window.addEventListener("message", (ev) => {
  if (ev.data && ev.data.type === "m4-interview-page") { setActiveMenu(ev.data.page); refreshStats(); }
});
refreshStats();
</script>
</body>
</html>
