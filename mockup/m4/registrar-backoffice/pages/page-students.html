<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M4 งานทะเบียน · รายการนักศึกษา</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ StudentList — registry.student ═══ -->
<div class="max-w-5xl">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-2xl font-bold">รายการนักศึกษา</h1>
      <p class="text-xs text-gray-500"><span id="count"></span> รายการ</p>
    </div>
  </div>
  <input id="q" oninput="render()" placeholder="ค้นหารหัสนักศึกษา/ชื่อ..."
    class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-64 mb-4 focus:outline-none focus:ring-2 focus:ring-green-300">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
        <tr>
          <th class="text-left px-4 py-3">รหัสนักศึกษา</th>
          <th class="text-left px-4 py-3">ชื่อ-นามสกุล</th>
          <th class="text-left px-4 py-3">หลักสูตร</th>
          <th class="text-left px-4 py-3">ปีที่เข้า</th>
          <th class="text-left px-4 py-3">สถานะ</th>
          <th class="text-left px-4 py-3">ที่ปรึกษา</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let students = loadData("m4_rb_students", seedStudents);
let applications = loadData("m4_rb_applications", seedApplications);

const STUDENT_STATUS_TH = {
  ENROLLED: "กำลังศึกษา", LEAVE: "ลาพัก", TEMP_LEAVE: "ลาชั่วคราว",
  RESIGNED: "สละสิทธิ์", EXPELLED: "ถูกไล่ออก", GRADUATED: "สำเร็จการศึกษา"
};
const STUDENT_STATUS_BADGE = {
  ENROLLED: "bg-green-100 text-green-700", LEAVE: "bg-amber-100 text-amber-700",
  TEMP_LEAVE: "bg-amber-100 text-amber-700", RESIGNED: "bg-gray-100 text-gray-600",
  EXPELLED: "bg-red-100 text-red-700", GRADUATED: "bg-blue-100 text-blue-700"
};

function render() {
  const q = (document.getElementById("q")?.value ?? "").toLowerCase();
  const list = students.filter((s) => {
    const acct = mockAccounts[s.account_id];
    const name = acct ? acct.name_th_first + " " + acct.name_th_last : "";
    return s.student_code.includes(q) || name.toLowerCase().includes(q);
  });
  document.getElementById("count").textContent = list.length;

  document.getElementById("rows").innerHTML = list.map((s) => {
    const acct = mockAccounts[s.account_id];
    const prog = mockPrograms[s.program_id];
    const advisor = mockInstructors[s.advisor_id];
    const name = acct ? acct.name_th_first + " " + acct.name_th_last : s.account_id;
    const pname = prog ? prog.name_th : s.program_id;
    const advisorName = advisor ? advisor.name : "-";
    return `
    <tr class="border-t border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-3 font-mono font-semibold">${s.student_code}</td>
      <td class="px-4 py-3">${name}<div class="text-xs text-gray-400 font-mono">${acct ? acct.email : ""}</div></td>
      <td class="px-4 py-3 text-gray-500">${pname}</td>
      <td class="px-4 py-3 text-gray-500">${s.enrolled_year}</td>
      <td class="px-4 py-3"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-semibold ${STUDENT_STATUS_BADGE[s.status]}">${STUDENT_STATUS_TH[s.status]}</span></td>
      <td class="px-4 py-3 text-xs text-gray-500">${advisorName}</td>
      <td class="px-4 py-3 text-right">
        <button onclick="alert('ดูประวัตินักศึกษา (จำลอง)\\n\\nstudent_id: ${s.student_id}\\nstudent_code: ${s.student_code}\\nprogram_version_id: ${s.program_version_id}')" class="text-xs text-green-700 hover:bg-green-50 rounded-lg px-2 py-1">ดูประวัติ</button>
      </td>
    </tr>`;
  }).join("") || `<tr><td colspan="7" class="px-4 py-10 text-center text-sm text-gray-400">ไม่พบข้อมูลนักศึกษา</td></tr>`;
}

function init() { render(); notifyParentPage("students"); }
</script>
</body>
</html>
