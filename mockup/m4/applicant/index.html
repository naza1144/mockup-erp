<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M4 · สมัครเรียนออนไลน์ — Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } html, body { height: 100%; margin: 0; } iframe { border: 0; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex flex-col h-screen">
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10 shrink-0">
    <div class="flex items-center gap-3">
      <a href="../../main%20page/index.html" class="text-sm text-gray-500 hover:text-gray-700">← กลับหน้าหลัก</a>
      <span class="w-7 h-7 rounded-lg bg-green-100 text-green-700 flex items-center justify-center font-bold text-xs">M4</span>
      <span class="font-semibold text-sm">ERP บริหารหลักสูตร · สมัครเรียนออนไลน์ (Applicant)</span>
    </div>
  </header>

  <iframe id="main-frame" name="main-frame" src="pages/page-apply.html" class="flex-1 w-full h-full"></iframe>
</div>

<script src="shared.js"></script>
<script>
/* แอปผู้สมัครไม่มี login role/เมนู sidebar — เลือกหน้าเริ่มต้นตามใบสมัครที่บันทึกไว้แล้ว (เทียบ m9/student chooseInitialPage) */
(function chooseInitialPage() {
  const app = loadData("m4_ap_application", null);
  document.getElementById("main-frame").src = app ? "pages/page-status.html" : "pages/page-apply.html";
})();
</script>
</body>
</html>
