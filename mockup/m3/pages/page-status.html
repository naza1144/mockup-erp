<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3 ฝ่ายบุคคล · ปรับสถานะอาจารย์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ AdjustStatus — UC-05 ═══ -->
<div>
  <a href="page-list.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับรายการอาจารย์</a>
  <h1 class="text-2xl font-bold mb-4">ปรับสถานะอาจารย์</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-lg space-y-4">
    <p class="text-sm">อาจารย์: <span id="st-name" class="font-semibold"></span></p>
    <div>
      <label class="text-sm font-semibold text-gray-700">สถานะใหม่</label>
      <select id="st-status" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1">
        <option value="FULL_TIME">ประจำ</option><option value="PART_TIME">พิเศษ</option>
        <option value="STUDY_LEAVE">ลาศึกษาต่อ</option><option value="RETIRED">เกษียณ</option>
        <option value="TERMINATED">พ้นสภาพ</option>
      </select>
    </div>
    <button onclick="saveStatus()"
      class="bg-orange-600 hover:bg-orange-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึก</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let instructors = loadData("m3_instructors", seedInstructors);
const id = new URLSearchParams(location.search).get("id");
const statusTarget = instructors.find((i) => i.instructor_id === id);

function saveStatus() {
  const v = document.getElementById("st-status").value;
  if (["RETIRED", "TERMINATED"].includes(v) &&
      !confirm("สถานะนี้มีผลต่อสิทธิ์การสอน/แต่งตั้ง — ยืนยันหรือไม่? (Alternative Flow UC-05)")) return;
  statusTarget.status = v; saveData("m3_instructors", instructors);
  alert("ปรับสถานะแล้ว");
  window.location.href = "page-list.html";
}

function init() {
  if (statusTarget) {
    /* BR-M3-002: name resolve จาก M0 API ไม่ store ใน faculty schema */
    document.getElementById("st-name").textContent = getInstructorName(statusTarget.account_id);
    document.getElementById("st-status").value = statusTarget.status;
  }
  notifyParentPage("list");
}
</script>
</body>
</html>
