<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3 ฝ่ายบุคคล · รายการอาจารย์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ FacultyList — UC-01/05 entry (โครงตาม guide §4.3) ═══ -->
<div class="max-w-4xl">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-2xl font-bold">รายการอาจารย์</h1>
      <p class="text-xs text-gray-500"><span id="count"></span> รายการ</p>
    </div>
    <button onclick="location.href='page-onboarding.html'"
      class="bg-orange-600 hover:bg-orange-700 text-white text-sm font-semibold rounded-xl px-4 py-2">＋ เพิ่มอาจารย์ใหม่</button>
  </div>
  <input id="q" oninput="render()" placeholder="ค้นหาชื่ออาจารย์..."
    class="w-full max-w-xs border border-gray-300 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-orange-300">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
        <tr>
          <th class="text-left px-4 py-3">ชื่อ-นามสกุล</th>
          <th class="text-left px-4 py-3">ตำแหน่ง/สังกัด</th>
          <th class="text-left px-4 py-3">สถานะ</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let instructors = loadData("m3_instructors", seedInstructors);

function openStatus(id) { location.href = "page-status.html?id=" + id; }

function render() {
  const q = document.getElementById("q").value ?? "";
  const list = instructors.filter((i) => getInstructorName(i.account_id).includes(q));
  document.getElementById("count").textContent = list.length;
  document.getElementById("rows").innerHTML = list.map((i) => {
    const name = getInstructorName(i.account_id);
    const deptName = getDeptName(i.dept_id);
    return `<tr class="border-t border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-3">${name}</td>
      <td class="px-4 py-3 text-gray-500">${ACADEMIC_RANK_TH[i.academic_rank] || i.academic_rank} · ${deptName}</td>
      <td class="px-4 py-3"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-semibold ${STATUS_BADGE[i.status]}">${STATUS_TH[i.status]}</span></td>
      <td class="px-4 py-3 text-right"><button onclick="openStatus('${i.instructor_id}')" class="text-orange-600 hover:bg-orange-50 rounded-lg px-3 py-1.5 text-sm">ปรับสถานะ</button></td>
    </tr>`;
  }).join("") || `<tr><td colspan="4" class="px-4 py-10 text-center text-sm text-gray-400">ไม่พบข้อมูล</td></tr>`;
}

function init() { render(); notifyParentPage("list"); }
</script>
</body>
</html>
