<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 บริษัท · รายชื่อนักศึกษาในสังกัด</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ CompanyStudentList — entry ═══ -->
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold mb-4">รายชื่อนักศึกษาในสังกัด</h1>
  <div id="student-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
let students = loadData("m8_co_students", seedStudents);

function openEval(id) { window.location.href = "page-eval.html?id=" + id; }
function openEditEval(id) { window.location.href = "page-edit-eval.html?id=" + id; }

/* จำลองอาจารย์รับทราบผล — สาธิต Alt Flow UC-18 (ล็อก can_edit) */
function simulateTeacherAck(id) {
  const s = students.find((x) => x.id === id); s.evaluation.ackStatus = "ACKNOWLEDGED"; s.evaluation.canEdit = false;
  saveData("m8_co_students", students); render();
}

function render() {
  document.getElementById("student-list").innerHTML = students.map((s) => `
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <div class="flex items-center justify-between">
        <div><p class="text-sm font-semibold">${s.name} (${s.code})</p><p class="text-xs text-gray-400">${s.position} · ${s.startDate} – ${s.endDate}</p></div>
        <div class="space-x-1">
          ${!s.evaluation ? `<button onclick="openEval(${s.id})" class="text-amber-700 hover:bg-amber-50 rounded-lg px-2 py-1 text-xs border border-amber-200">ประเมิน</button>`
            : s.evaluation.canEdit ? `<button onclick="openEditEval(${s.id})" class="text-amber-700 hover:bg-amber-50 rounded-lg px-2 py-1 text-xs border border-amber-200">แก้ไขผลประเมิน</button>`
            : `<span class="text-xs text-gray-400">ล็อกแล้ว (อาจารย์รับทราบแล้ว)</span>`}
        </div>
      </div>
      ${s.evaluation ? `<p class="text-xs text-gray-500 mt-2">ประเมินแล้ว: ${s.evaluation.total}/100 ${s.evaluation.ackStatus === "UNREAD" ? `· <button onclick="simulateTeacherAck(${s.id})" class="underline hover:text-amber-700">(จำลอง) อาจารย์รับทราบ</button>` : "· อาจารย์รับทราบแล้ว"}</p>` : ""}
    </div>`).join("");
}

function init() {
  render();
  notifyParentPage("list");
}
</script>
</body>
</html>
