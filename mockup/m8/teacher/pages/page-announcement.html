<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 อาจารย์/ผจก.รายวิชา · ประกาศข่าวสหกิจ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 13. Announcement — UC-23 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">ประกาศข่าวสหกิจ</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-lg space-y-3 mb-5">
    <div><label class="text-sm font-semibold text-gray-700">หัวข้อ</label><input id="an-title" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></div>
    <div><label class="text-sm font-semibold text-gray-700">เนื้อหา</label><textarea id="an-content" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></textarea></div>
    <div class="flex items-center gap-4">
      <label class="text-sm flex items-center gap-1"><input type="checkbox" id="an-pinned"> ปักหมุด</label>
      <select id="an-target" class="border border-gray-300 rounded-lg px-2 py-1.5 text-sm"><option value="ALL">ทุกคน</option><option value="STUDENT">นักศึกษาเท่านั้น</option></select>
    </div>
    <p id="an-error" class="text-xs text-red-600 hidden">กรอกหัวข้อและเนื้อหาให้ครบ</p>
    <button onclick="publishAnnouncement()" class="bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold rounded-xl px-4 py-2">เผยแพร่</button>
  </div>
  <div id="an-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
let announcements = loadData("m8_tc_announcements", seedAnnouncements);

/* ═══ UC-23 — ประกาศข่าว ═══ */
function publishAnnouncement() {
  const title = document.getElementById("an-title").value.trim(); const content = document.getElementById("an-content").value.trim();
  const err = document.getElementById("an-error");
  if (!title || !content) { err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  announcements.unshift({ title, content, pinned: document.getElementById("an-pinned").checked, target: document.getElementById("an-target").value, date: new Date().toISOString().slice(0, 10) });
  saveData("m8_tc_announcements", announcements);
  document.getElementById("an-title").value = ""; document.getElementById("an-content").value = "";
  alert("เผยแพร่ข่าวสำเร็จ"); render();
}

function deleteAnnouncement(index) {
  const announcement = announcements[index];
  if (!announcement || !confirm(`ต้องการลบข่าว "${announcement.title}" ใช่หรือไม่?`)) return;
  announcements.splice(index, 1);
  saveData("m8_tc_announcements", announcements);
  render();
}

function render() {
  document.getElementById("an-list").innerHTML = announcements.map((a, index) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 flex items-start justify-between gap-3">
      <div class="min-w-0">
        <p class="text-sm font-semibold">${a.pinned ? "ปักหมุด · " : ""}${a.title}</p>
        <p class="text-xs text-gray-500 mt-1">${a.content}</p>
        <p class="text-[11px] text-gray-400 mt-1">เผยแพร่ ${a.date} · ${a.target === "STUDENT" ? "นักศึกษาเท่านั้น" : "ทุกคน"}</p>
      </div>
      <button type="button" onclick="deleteAnnouncement(${index})" class="shrink-0 border border-red-200 text-red-600 hover:bg-red-50 rounded-lg px-3 py-1.5 text-xs font-semibold">ลบ</button>
    </div>`).join("") || `<p class="text-sm text-gray-400">ยังไม่มีข่าวที่เผยแพร่</p>`;
}

function init() {
  if (!enforceRole(["manager"])) return;
  render();
  notifyParentPage("announcement");
}
</script>
</body>
</html>
