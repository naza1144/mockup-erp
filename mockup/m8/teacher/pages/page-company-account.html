<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 อาจารย์/ผจก.รายวิชา · จัดการบัญชีตัวแทนบริษัท</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 3. CompanyAccount — UC-02 ═══ -->
<div>
  <a href="page-company-db.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">จัดการบัญชีตัวแทนบริษัท — <span id="ca-company-name" class="text-amber-700"></span></h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-md space-y-3">
    <div><label class="text-sm font-semibold text-gray-700">ชื่อผู้ติดต่อ</label><input id="ca-contact" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></div>
    <div><label class="text-sm font-semibold text-gray-700">Username</label><input id="ca-username" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></div>
    <div><label class="text-sm font-semibold text-gray-700">Email</label><input id="ca-email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></div>
    <p id="ca-error" class="text-xs text-red-600 hidden"></p>
    <div class="space-x-2">
      <button onclick="saveCompanyAccount()" class="bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึก</button>
      <button onclick="resetCompanyPassword()" class="text-sm text-gray-600 hover:bg-gray-50 rounded-lg px-3 py-2 border border-gray-300">รีเซ็ตรหัสผ่าน</button>
      <button onclick="deleteCompanyAccount()" class="text-sm text-red-600 hover:bg-red-50 rounded-lg px-3 py-2 border border-red-200">ลบบัญชี</button>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let companies = loadData("m8_tc_companies", seedCompanies);
const companyId = Number(new URLSearchParams(location.search).get("company"));
const curCompany = companies.find((c) => c.id === companyId);

/* ═══ UC-02 — บัญชีตัวแทนบริษัท (username uniqueness) ═══ */
function saveCompanyAccount() {
  const username = document.getElementById("ca-username").value.trim();
  const err = document.getElementById("ca-error");
  const dup = companies.some((c) => c.account && c.account.username === username && c.id !== curCompany.id);
  if (!username) { err.textContent = "กรอก Username"; err.classList.remove("hidden"); return; }
  if (dup) { err.textContent = "Username นี้ใช้แล้ว กรุณาเปลี่ยน (M0 ปฏิเสธ)"; err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  /* ระบบจริง: เรียก M0 provision account role=company */
  curCompany.account = { username, contact: document.getElementById("ca-contact").value, email: document.getElementById("ca-email").value };
  saveData("m8_tc_companies", companies);
  alert("บันทึกบัญชีตัวแทนบริษัทแล้ว (จำลอง provision ผ่าน M0)");
  window.location.href = "page-company-db.html";
}
function resetCompanyPassword() { if (!curCompany.account) { alert("ยังไม่มีบัญชี"); return; } alert("รีเซ็ตรหัสผ่านสำเร็จ — ส่งรหัสใหม่ให้ตัวแทนบริษัทแล้ว (จำลอง)"); }
function deleteCompanyAccount() {
  if (!confirm("ต้องการลบบัญชีนี้?")) return;
  curCompany.account = null; saveData("m8_tc_companies", companies);
  alert("ลบบัญชีแล้ว");
  window.location.href = "page-company-db.html";
}

function render() {
  document.getElementById("ca-company-name").textContent = curCompany.name;
  document.getElementById("ca-contact").value = curCompany.account?.contact ?? "";
  document.getElementById("ca-username").value = curCompany.account?.username ?? "";
  document.getElementById("ca-email").value = curCompany.account?.email ?? "";
}

function init() {
  if (!enforceRole(["manager"])) return;
  render();
  notifyParentPage("company-db");
}
</script>
</body>
</html>
