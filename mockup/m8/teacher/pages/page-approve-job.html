<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 อาจารย์/ผจก.รายวิชา · ใบสมัครรอพิจารณา</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 6. ApproveJob — UC-09 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">ใบสมัครรอพิจารณา</h1>
  <div id="job-review-list" class="space-y-2 mb-4"></div>
  <div id="job-review-form" class="hidden bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-lg space-y-2 text-sm">
    <p>นักศึกษา: <span id="jf-student" class="font-semibold"></span> (GPAX <span id="jf-gpax"></span>, อบรม <span id="jf-hours"></span> ชม.)</p>
    <p>บริษัท: <span id="jf-company"></span> · ตำแหน่ง: <span id="jf-position"></span></p>
    <p>ผู้ดูแล: <span id="jf-caregiver"></span></p>
    <p>ที่พัก: <span id="jf-accommodation"></span></p>
    <p>ผู้ติดต่อฉุกเฉิน: <span id="jf-emergency"></span></p>
    <p>ช่วงฝึก: <span id="jf-period"></span></p>
    <div class="space-x-2 pt-2">
      <button onclick="approveJob()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl px-4 py-2">อนุมัติ</button>
      <button onclick="rejectJob()" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 text-sm font-semibold rounded-xl px-4 py-2">ปฏิเสธ</button>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let students = loadData("m8_tc_students", seedStudents);
let companies = loadData("m8_tc_companies", seedCompanies);
let curJobCtx = null;

/* ═══ UC-09 — อนุมัติ/ปฏิเสธใบสมัคร ═══ */
function openJobReview(studentId) { curJobCtx = studentId; render(); document.getElementById("job-review-form").classList.remove("hidden"); }
function approveJob() {
  const s = students.find((x) => x.id === curJobCtx);
  s.application.status = "APPROVED"; s.application.history.push({ status: "APPROVED", date: new Date().toISOString().slice(0, 10) });
  saveData("m8_tc_students", students); curJobCtx = null; document.getElementById("job-review-form").classList.add("hidden");
  alert("อนุมัติใบสมัครแล้ว — นักศึกษาสามารถเริ่มฝึกงานได้"); render();
}
function rejectJob() {
  const reason = prompt("ระบุเหตุผลการปฏิเสธ:"); if (!reason) return;
  const s = students.find((x) => x.id === curJobCtx);
  s.application.status = "REJECTED"; s.application.teacherNote = reason; s.application.history.push({ status: "REJECTED", date: new Date().toISOString().slice(0, 10) });
  saveData("m8_tc_students", students); curJobCtx = null; document.getElementById("job-review-form").classList.add("hidden");
  alert("ปฏิเสธใบสมัครแล้ว"); render();
}

function render() {
  const pendingJobs = students.filter((s) => s.application?.status === "APPLIED");
  document.getElementById("job-review-list").innerHTML = pendingJobs.map((s) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 flex items-center justify-between">
      <div><p class="text-sm font-semibold">${s.name} (${s.code})</p><p class="text-xs text-gray-400">${companies.find((c) => c.id === s.application.companyId)?.name} — ${s.application.position}</p></div>
      <button onclick="openJobReview(${s.id})" class="text-amber-700 hover:bg-amber-50 rounded-lg px-2 py-1 text-xs">ตรวจ</button>
    </div>`).join("") || `<p class="text-sm text-gray-400">ไม่มีใบสมัครรอพิจารณา</p>`;
  if (curJobCtx && document.getElementById("job-review-form") && !document.getElementById("job-review-form").classList.contains("hidden")) {
    const s = students.find((x) => x.id === curJobCtx); const app = s.application;
    document.getElementById("jf-student").textContent = `${s.name} (${s.code})`; document.getElementById("jf-gpax").textContent = s.gpax; document.getElementById("jf-hours").textContent = studentApprovedHours(s);
    document.getElementById("jf-company").textContent = companies.find((c) => c.id === app.companyId)?.name;
    document.getElementById("jf-position").textContent = app.position; document.getElementById("jf-accommodation").textContent = app.accommodation;
    document.getElementById("jf-caregiver").textContent = app.caregiver || "ยังไม่ระบุ";
    document.getElementById("jf-emergency").textContent = [app.emergencyName, app.emergencyPhone].filter(Boolean).join(" · ") || "ยังไม่ระบุ";
    document.getElementById("jf-period").textContent = `${app.startDate} – ${app.endDate}`;
  }
}

function init() {
  if (!enforceRole(["manager"])) return;
  render();
  notifyParentPage("approve-job");
}
</script>
</body>
</html>
