<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 อาจารย์/ผจก.รายวิชา · Knowledge Base บริษัท</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 4. CompanyKB — UC-03 ═══ -->
<div>
  <a href="page-company-db.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">Knowledge Base — <span id="kb-company-name" class="text-amber-700"></span></h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-2xl space-y-3">
    <p class="text-sm">Rating เฉลี่ย: <span id="kb-rating" class="font-semibold"></span> / 5</p>
    <p class="text-sm font-semibold">ประวัติการส่งนักศึกษา</p>
    <div id="kb-history" class="text-sm space-y-1"></div>
    <div><label class="text-sm font-semibold text-gray-700">ความเห็นอาจารย์ (สะสมข้ามรุ่น)</label>
      <textarea id="kb-notes" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></textarea></div>
    <button onclick="saveCompanyNotes()" class="bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึก</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let companies = loadData("m8_tc_companies", seedCompanies);
const companyId = Number(new URLSearchParams(location.search).get("company"));
const curCompany = companies.find((c) => c.id === companyId);

/* ═══ UC-03 — Knowledge Base ═══ */
function saveCompanyNotes() { curCompany.notes = document.getElementById("kb-notes").value; saveData("m8_tc_companies", companies); alert("บันทึกความเห็นแล้ว"); }

function render() {
  document.getElementById("kb-company-name").textContent = curCompany.name;
  document.getElementById("kb-rating").textContent = curCompany.rating;
  document.getElementById("kb-history").innerHTML = curCompany.history.map((h) => `<p>ปี ${h.year} · ${h.position} · ${h.count} คน</p>`).join("") || `<p class="text-gray-400">ยังไม่มีข้อมูล</p>`;
  document.getElementById("kb-notes").value = curCompany.notes;
}

function init() {
  if (!enforceRole(["manager"])) return;
  render();
  notifyParentPage("company-db");
}
</script>
</body>
</html>
