<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 อาจารย์/ผจก.รายวิชา · ตรวจ/อนุมัติชั่วโมงอบรม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 5. TrainingReview — UC-05 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">ตรวจ/อนุมัติชั่วโมงอบรม</h1>
  <div id="tr-review-list" class="space-y-2 mb-4"></div>
  <div id="tr-review-form" class="hidden bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-md space-y-3">
    <p class="text-sm">นักศึกษา: <span id="trf-student" class="font-semibold"></span> — <span id="trf-topic"></span> (ขอ <span id="trf-req"></span> ชม.)</p>
    <div><label class="text-sm font-semibold text-gray-700">ชั่วโมงที่อนุมัติจริง</label><input id="trf-approve-hours" type="number" class="w-full max-w-[120px] border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></div>
    <div class="space-x-2">
      <button onclick="approveTraining()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl px-4 py-2">อนุมัติ</button>
      <button onclick="rejectTraining()" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 text-sm font-semibold rounded-xl px-4 py-2">ปฏิเสธ</button>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let students = loadData("m8_tc_students", seedStudents);
let curTrainingCtx = null;

/* ═══ UC-05 — ตรวจ/อนุมัติชั่วโมงอบรม ═══ */
function openTrainingReview(studentId, trainingId) { curTrainingCtx = { studentId, trainingId }; render(); document.getElementById("tr-review-form").classList.remove("hidden"); }
function approveTraining() {
  const s = students.find((x) => x.id === curTrainingCtx.studentId); const t = s.trainings.find((x) => x.id === curTrainingCtx.trainingId);
  const hrs = Number(document.getElementById("trf-approve-hours").value || 0);
  if (hrs > t.reqHours && !confirm(`คุณอนุมัติ ${hrs} ชม. มากกว่าที่ขอ (${t.reqHours} ชม.) — ยืนยันหรือไม่?`)) return;
  t.status = "APPROVED"; t.approvedHours = hrs; saveData("m8_tc_students", students);
  curTrainingCtx = null; document.getElementById("tr-review-form").classList.add("hidden");
  alert("อนุมัติชั่วโมงอบรมแล้ว"); render();
}
function rejectTraining() {
  const reason = prompt("ระบุเหตุผลการปฏิเสธ:"); if (!reason) return;
  const s = students.find((x) => x.id === curTrainingCtx.studentId); const t = s.trainings.find((x) => x.id === curTrainingCtx.trainingId);
  t.status = "REJECTED"; t.teacherNote = reason; saveData("m8_tc_students", students);
  curTrainingCtx = null; document.getElementById("tr-review-form").classList.add("hidden");
  alert("ปฏิเสธแล้ว"); render();
}

function render() {
  const pendingTrainings = students.flatMap((s) => s.trainings.filter((t) => t.status === "PENDING").map((t) => ({ s, t })));
  document.getElementById("tr-review-list").innerHTML = pendingTrainings.map(({ s, t }) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 flex items-center justify-between">
      <div><p class="text-sm font-semibold">${s.name} (${s.code})</p><p class="text-xs text-gray-400">${t.topic} — ขอ ${t.reqHours} ชม.</p></div>
      <button onclick="openTrainingReview(${s.id},${t.id})" class="text-amber-700 hover:bg-amber-50 rounded-lg px-2 py-1 text-xs">ตรวจ</button>
    </div>`).join("") || `<p class="text-sm text-gray-400">ไม่มีรายการรอตรวจ</p>`;
  if (curTrainingCtx && curTrainingCtx.trainingId) {
    const s = students.find((x) => x.id === curTrainingCtx.studentId); const t = s.trainings.find((x) => x.id === curTrainingCtx.trainingId);
    document.getElementById("trf-student").textContent = s.name; document.getElementById("trf-topic").textContent = t.topic; document.getElementById("trf-req").textContent = t.reqHours;
    document.getElementById("trf-approve-hours").value = t.reqHours;
  }
}

function init() {
  if (!enforceRole(["manager"])) return;
  render();
  notifyParentPage("training-review");
}
</script>
</body>
</html>
