<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 อาจารย์/ผจก.รายวิชา · จัดการเอกสารสหกิจ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 14. DocManage — UC-24 ═══ -->
<div>
  <h1 class="text-2xl font-bold mb-4">จัดการเอกสารสหกิจ</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 flex gap-2 max-w-2xl mb-4">
    <input id="dm-title" placeholder="ชื่อเอกสาร" class="border border-gray-300 rounded-lg px-2 py-1.5 text-sm flex-1">
    <input type="file" id="dm-file" onchange="pickDocFile()" class="text-sm">
    <button onclick="uploadDoc()" class="bg-amber-600 hover:bg-amber-700 text-white text-sm rounded-lg px-3">อัปโหลด</button>
  </div>
  <p id="dm-error" class="text-xs text-red-600 hidden mb-2"></p>
  <div id="dm-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
let documents = loadData("m8_tc_documents", seedDocuments);
let pickedDocFile = null;

/* ═══ UC-24 — จัดการเอกสาร ═══ */
function pickDocFile() {
  const input = document.getElementById("dm-file"); const file = input.files[0]; const err = document.getElementById("dm-error");
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { err.textContent = "ไฟล์มีขนาดเกิน 10MB"; err.classList.remove("hidden"); input.value = ""; pickedDocFile = null; return; }
  err.classList.add("hidden"); pickedDocFile = file.name;
}
function uploadDoc() {
  const title = document.getElementById("dm-title").value.trim(); const err = document.getElementById("dm-error");
  if (!title || !pickedDocFile) { err.textContent = "กรอกชื่อเอกสารและเลือกไฟล์ก่อนอัปโหลด"; err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  documents.push({ title, date: new Date().toISOString().slice(0, 10) });
  saveData("m8_tc_documents", documents);
  document.getElementById("dm-title").value = ""; document.getElementById("dm-file").value = ""; pickedDocFile = null;
  alert("อัปโหลดเอกสารแล้ว (จำลอง — เก็บที่ M10 Storage bucket coop-docs)"); render();
}
function deleteDocument(index) {
  const documentItem = documents[index];
  if (!documentItem || !confirm(`ต้องการลบเอกสาร "${documentItem.title}" ใช่หรือไม่?`)) return;
  documents.splice(index, 1);
  saveData("m8_tc_documents", documents);
  render();
}

function render() {
  document.getElementById("dm-list").innerHTML = documents.map((d, i) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 flex items-start justify-between gap-3">
      <div class="min-w-0"><p class="text-sm font-semibold">${d.title}</p><p class="text-[11px] text-gray-400 mt-1">อัปโหลด ${d.date}</p></div>
      <button type="button" onclick="deleteDocument(${i})" class="shrink-0 border border-red-200 text-red-600 hover:bg-red-50 rounded-lg px-3 py-1.5 text-xs font-semibold">ลบ</button>
    </div>`).join("") || `<p class="text-sm text-gray-400">ยังไม่มีเอกสารที่เผยแพร่</p>`;
}

function init() {
  if (!enforceRole(["manager"])) return;
  render();
  notifyParentPage("doc-manage");
}
</script>
</body>
</html>
