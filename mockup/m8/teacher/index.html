<script src="shared.js"></script>
<script>
function setActiveMenu(pageKey) {
  document.querySelectorAll(".menu-link").forEach((el) => {
    const on = el.dataset.page === pageKey;
    el.classList.toggle("bg-amber-50", on); el.classList.toggle("text-amber-700", on); el.classList.toggle("font-semibold", on);
  });
}
window.addEventListener("message", (ev) => {
  if (ev.data && ev.data.type === "m8-teacher-page") setActiveMenu(ev.data.page);
});

</script>
