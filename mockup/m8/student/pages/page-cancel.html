<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 นักศึกษา · ยกเลิกการฝึกงาน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ CancelReapply — UC-10 ═══ -->
<div>
  <a href="page-track.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">ยกเลิกการฝึกงาน</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-md space-y-3">
    <p class="text-sm">ต้องการยกเลิกการฝึกงานที่ <span id="cr-company" class="font-semibold"></span> ใช่หรือไม่?</p>
    <div><label class="text-sm font-semibold text-gray-700">เหตุผล</label><textarea id="cr-reason" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></textarea></div>
    <p id="cr-error" class="text-xs text-red-600 hidden">กรุณาระบุเหตุผลก่อนยกเลิก</p>
    <button onclick="confirmCancel()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ยืนยันยกเลิก</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let application = loadData("m8_st_application", null);
let weeklyReports = loadData("m8_st_weekly", []);

/* ═══ UC-10 — ยกเลิก + สมัครใหม่ ═══ */
function confirmCancel() {
  const reason = document.getElementById("cr-reason").value.trim();
  const err = document.getElementById("cr-error");
  if (!reason) { err.classList.remove("hidden"); return; }
  err.classList.add("hidden");
  application.status = "CANCELLED"; application.cancelReason = reason;
  application.history.push({ status: "CANCELLED", date: new Date().toISOString().slice(0, 10), by: "นักศึกษา" });
  saveData("m8_st_application", application);
  weeklyReports = []; saveData("m8_st_weekly", weeklyReports);
  alert("ยกเลิกการฝึกงานแล้ว — สามารถสมัครที่ใหม่ได้"); window.location.href = "page-apply-job.html";
}

function init() {
  if (application) document.getElementById("cr-company").textContent = application.companyName;
  notifyParentPage("cancel");
}
</script>
</body>
</html>
