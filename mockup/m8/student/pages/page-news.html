<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8 นักศึกษา · ข่าวสาร/เอกสารสหกิจ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ NewsDocs — UC-25 ═══ -->
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold mb-4">ข่าวสาร/เอกสารสหกิจ</h1>
  <p class="text-sm font-semibold mb-2">ข่าวสาร</p>
  <div id="news-list" class="space-y-2 mb-5"></div>
  <p class="text-sm font-semibold mb-2">เอกสาร</p>
  <div id="doc-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
function init() {
  document.getElementById("news-list").innerHTML = [...seedAnnouncements].sort((a, b) => (b.pinned - a.pinned)).map((a) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3"><p class="text-sm font-semibold">${a.pinned ? "📌 " : ""}${a.title}</p><p class="text-xs text-gray-500 mt-1">${a.content}</p><p class="text-xs text-gray-400 mt-1">${a.date}</p></div>`).join("") || `<p class="text-sm text-gray-400">ยังไม่มีข่าวสาร</p>`;
  document.getElementById("doc-list").innerHTML = seedDocuments.map((d) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 flex items-center justify-between"><div><p class="text-sm font-semibold">${d.title}</p><p class="text-xs text-gray-400">${d.date}</p></div>
    <button onclick="alert('ดาวน์โหลด (จำลอง presigned URL จาก M10)')" class="text-amber-700 hover:bg-amber-50 rounded-lg px-2 py-1 text-xs">ดาวน์โหลด</button></div>`).join("") || `<p class="text-sm text-gray-400">ยังไม่มีเอกสาร</p>`;
  notifyParentPage("news");
}
</script>
</body>
</html>
