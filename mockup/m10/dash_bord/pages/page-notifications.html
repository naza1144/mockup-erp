<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M10 · Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans Thai', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 p-6">
  <h1 class="text-2xl font-bold mb-1">Notification Service (E4)</h1>
  <p class="text-xs text-blue-600 mb-4">UC-09 (Email) · UC-12 (Event-driven) — ส่งแจ้งเตือนอัตโนมัติเมื่อมี event เกิดขึ้น พร้อม retry + log</p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
      <h2 class="text-sm font-semibold mb-3">ส่ง Email ทดสอบ</h2>
      <p class="text-xs text-gray-500 mb-2">ทดสอบส่ง email ผ่าน Notification Service</p>
      <div class="space-y-2">
        <input id="test-email" type="email" placeholder="อีเมลผู้รับ" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
        <input id="test-msg" placeholder="ข้อความ" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
        <button onclick="sendTest()" class="bg-orange-600 hover:bg-orange-700 text-white text-sm rounded-xl px-4 py-2">📧 ส่งทดสอบ</button>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
      <h2 class="text-sm font-semibold mb-3">Delivery Log</h2>
      <p class="text-xs text-gray-500 mb-2">ประวัติการส่ง notification ล่าสุด</p>
      <div id="delivery-list" class="text-xs space-y-1"></div>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("notifications");
      const deliveries = loadData("deliveries", SEED_DELIVERIES);
      document.getElementById("delivery-list").innerHTML = deliveries.map(d =>
        `<div class="flex justify-between border-b border-gray-100 pb-1">
          <span class="text-gray-400 text-[10px]">${d.created_at}</span>
          <span class="font-mono">${d.event}</span>
          <span>${d.title}</span>
          <span>${d.channel}</span>
          <span class="${d.status === 'sent' ? 'text-green-600' : d.status === 'dead' ? 'text-red-600' : 'text-amber-600'}">${d.status}</span>
        </div>`
      ).join("");
    }

    function sendTest() {
      const email = document.getElementById("test-email").value;
      const msg = document.getElementById("test-msg").value;
      if (!email || !msg) { alert("กรุณากรอกอีเมลและข้อความ"); return; }
      alert(`✅ ส่ง email ทดสอบไปยัง ${email} แล้ว (จำลอง)`);
    }
    init();
  </script>
</body>
</html>
