<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M10 · Storage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans Thai', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 p-6">
  <h1 class="text-2xl font-bold mb-1">File Storage — MinIO (E3)</h1>
  <p class="text-xs text-blue-600 mb-4">UC-06 (Deploy MinIO & Buckets) · UC-07 (Presigned URL) — S3-compatible object storage แยก bucket ต่อ domain</p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
      <h2 class="text-sm font-semibold mb-3">Buckets ต่อ Domain (UC-06)</h2>
      <p class="text-xs text-gray-500 mb-2">MinIO: 5 buckets แยกต่อ Domain</p>
      <div id="bucket-list" class="text-xs space-y-2"></div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
      <h2 class="text-sm font-semibold mb-3">Presigned URL (UC-07)</h2>
      <p class="text-xs text-gray-500 mb-2">Client upload/download ตรงถึง MinIO โดยไม่ผ่าน backend</p>
      <div class="space-y-2">
        <select id="ps-bucket" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
          <option>account-avatars</option><option>curriculum-docs</option>
          <option>student-files</option><option>thesis-files</option><option>coop-reports</option>
        </select>
        <button onclick="genUrl()" class="bg-orange-600 hover:bg-orange-700 text-white text-sm rounded-xl px-4 py-2">🔗 Generate</button>
        <div id="ps-result" class="hidden mt-2 bg-gray-50 rounded-lg p-2 text-xs font-mono break-all"></div>
      </div>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("storage");
      const buckets = loadData("buckets", SEED_BUCKETS);
      document.getElementById("bucket-list").innerHTML = buckets.map(b =>
        `<div class="flex items-center justify-between border-b border-gray-100 pb-1.5">
          <span class="font-mono font-semibold">${b.name}</span>
          <span class="text-gray-400">${b.module}</span>
          <span class="text-gray-500">${b.objects} objects · ${b.size}</span>
        </div>`
      ).join("");
    }
    function genUrl() {
      const bucket = document.getElementById("ps-bucket").value;
      const url = `https://minio.erp.ubu.ac.th/${bucket}/uploads/${Date.now()}.pdf?X-Amz-Expires=900`;
      const box = document.getElementById("ps-result");
      box.classList.remove("hidden");
      box.textContent = url;
    }
    init();
  </script>
</body>
</html>
