<!DOCTYPE html>
<html lang="th">
<head>
  <!--
    ═══════════════════════════════════════════════════════
    M10 · Audit Log (E5)

    Flow:
    1. โหลด → ตาราง Audit Log (8 รายการ)
       └─ เวลา · ผู้กระทำ · Action · Service · Entity · รายละเอียด
       └─ สี: INSERT=🟢, UPDATE=🔵, DELETE=🔴
    2. 🔒 Append-only · Immutable — ไม่สามารถแก้ไขหรือลบได้

    Audit Flow:
    Request → Traefik → Service API → Middleware บันทึก Audit
      → NATS (audit.logged) → M10 Audit Service → PostgreSQL (append-only)

    Epic: E5 · Audit Log — UC-13 (บันทึกอัตโนมัติ), UC-14 (ค้นหา/ดู)
    ═══════════════════════════════════════════════════════
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M10 · Audit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans Thai', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 p-6">
  <h1 class="text-2xl font-bold mb-1">Audit Log (E5)</h1>
  <p class="text-xs text-blue-600 mb-1">UC-13 (บันทึก Audit Log อัตโนมัติ) · UC-14 (ค้นหา/ดู Audit Log) — Append-only middleware บันทึก who/what/when ทุก write operation</p>
  <p class="text-xs text-amber-700 mb-4">🔒 Append-only · Immutable — ไม่สามารถแก้ไขหรือลบได้</p>

  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-xs">
        <thead class="bg-gray-50 text-gray-500 uppercase tracking-wider">
          <tr>
            <th class="text-left px-4 py-3">เวลา</th>
            <th class="text-left px-4 py-3">ผู้กระทำ</th>
            <th class="text-left px-4 py-3">Action</th>
            <th class="text-left px-4 py-3">Service</th>
            <th class="text-left px-4 py-3">Entity</th>
            <th class="text-left px-4 py-3">รายละเอียด</th>
          </tr>
        </thead>
        <tbody id="audit-rows"></tbody>
      </table>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("audit");
      const audit = loadData("audit", SEED_AUDIT);
      const ACTIONS_COLOR = { INSERT: "text-green-600", UPDATE: "text-blue-600", DELETE: "text-red-600" };
      document.getElementById("audit-rows").innerHTML = audit.map(a =>
        `<tr class="border-b border-gray-100 hover:bg-gray-50">
          <td class="px-4 py-3 text-gray-500">${a.time}</td>
          <td class="px-4 py-3 font-semibold">${a.actor}</td>
          <td class="px-4 py-3 ${ACTIONS_COLOR[a.action] || ''}">${a.action}</td>
          <td class="px-4 py-3">${a.service}</td>
          <td class="px-4 py-3">${a.entity}</td>
          <td class="px-4 py-3 text-gray-500">${a.detail}</td>
        </tr>`
      ).join("");
    }
    init();
  </script>
</body>
</html>
