<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M10 · Platform Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    .menu-btn.active { background-color: #e2e8f0; color: #334155; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

<header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10">
  <div class="flex items-center gap-3">
    <a href="../../main%20page/index.html" class="text-sm text-gray-500 hover:text-gray-700">← กลับหน้าหลัก</a>
    <span class="w-7 h-7 rounded-lg bg-slate-100 text-slate-700 flex items-center justify-center font-bold text-xs">M10</span>
    <span class="font-semibold text-sm text-gray-800">ERP บริหารหลักสูตร · Platform Console</span>
  </div>
  <div class="flex items-center gap-3">
    <span class="text-xs text-gray-500">เข้าสู่ระบบในฐานะ: <span class="font-semibold text-gray-700">Admin/DevOps</span></span>
    <button onclick="resetData()" class="text-xs text-gray-400 hover:text-red-600 underline">รีเซ็ตข้อมูล</button>
  </div>
</header>

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <nav class="w-56 bg-white border-r border-gray-200 p-3 shrink-0 space-y-0.5 overflow-y-auto">
    <p class="px-2 py-1 text-[11px] uppercase tracking-wide text-gray-400">เมนู</p>
    <a href="pages/page-dashboard.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      Dashboard
    </a>
    <a href="pages/page-schemas.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      Schema & Data Silo
    </a>
    <a href="pages/page-events.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      Event Bus
    </a>
    <a href="pages/page-storage.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      File Storage
    </a>
    <a href="pages/page-notifications.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      Notification
    </a>
    <a href="pages/page-audit.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      Audit Log
    </a>
    <a href="pages/page-devops.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      DevOps & CI/CD
    </a>
    <a href="pages/page-standards.html" target="main-frame" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50" onclick="setActive(this)">
      API Standards
    </a>
    <a href="pages/page-traefik.html" target="_top" class="menu-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50">
      Traefik Admin
    </a>
  </nav>

  <!-- Content Area -->
  <iframe id="main-frame" name="main-frame" src="pages/page-dashboard.html" class="flex-1 border-0" style="min-height: calc(100vh - 57px);"></iframe>
</div>

<script src="shared.js"></script>
<script>
  function setActive(el) {
    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
  window.addEventListener("message", (ev) => {
    if (ev.data?.type === "m10-page") {
      document.querySelectorAll('.menu-btn').forEach(b => {
        const href = b.getAttribute('href');
        b.classList.toggle('active', href && href.includes(ev.data.page));
      });
    }
  });
  document.querySelector('.menu-btn').classList.add('active');
</script>
</body>
</html>
