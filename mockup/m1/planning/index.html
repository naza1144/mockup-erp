<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 · จัดตารางเรียน (Planning) — Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } html, body { height: 100%; margin: 0; } iframe { border: 0; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex flex-col h-screen">
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10 shadow-sm shrink-0">
    <div class="flex items-center gap-3">
      <a href="../../main%20page/index.html" class="text-sm text-gray-500 hover:text-teal-600 transition-colors">← กลับหน้าหลัก</a>
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-teal-500 to-emerald-600 text-white flex items-center justify-center font-bold text-xs shadow-md">M1</span>
      <span class="font-semibold text-sm text-gray-700">ERP บริหารหลักสูตร · จัดตารางเรียน (Planning)</span>
    </div>
    <div class="flex items-center gap-2">
      <label class="text-xs text-gray-500">บทบาท (จำลอง):</label>
      <select onchange="setRole(this.value)" id="roleSwitch" class="border border-gray-300 rounded-lg px-2 py-1 text-sm focus:ring-2 focus:ring-teal-500 outline-none bg-white">
        <option value="curriculum_officer">เจ้าหน้าที่หลักสูตร</option>
        <option value="scheduler">ผู้จัดตาราง (Scheduler)</option>
        <option value="faculty">อาจารย์</option>
        <option value="student">นักศึกษา</option>
      </select>
    </div>
  </header>

  <div class="flex flex-1 min-h-0">
    <nav class="w-60 bg-white border-r border-gray-200 p-4 shrink-0 space-y-1 overflow-y-auto hidden md:block">
      <p class="px-2 py-2 text-[11px] uppercase tracking-wider text-gray-400 font-bold">เมนูหลัก</p>
      <a data-page="master" data-roles="curriculum_officer,scheduler" href="pages/page-master.html" target="main-frame" class="menu-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
        ข้อมูลหลัก (Master Data)
      </a>
      <a data-page="section-create" data-roles="curriculum_officer,scheduler" href="pages/page-section-create.html" target="main-frame" class="menu-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
        สร้างกลุ่มเรียน (Section)
      </a>
      <a data-page="timetable" data-roles="curriculum_officer,scheduler,faculty,student" href="pages/page-timetable.html" target="main-frame" class="menu-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        ตารางเรียน-สอน (Timetable)
      </a>
      <a data-page="room-booking" data-roles="curriculum_officer,scheduler" href="pages/page-room-booking.html" target="main-frame" class="menu-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        จองห้อง (Room Booking)
      </a>
      <a data-page="publish" data-roles="curriculum_officer,scheduler" href="pages/page-publish.html" target="main-frame" class="menu-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left text-gray-600 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
        เผยแพร่ตารางเรียน
      </a>
    </nav>

    <iframe id="main-frame" name="main-frame" src="pages/page-master.html" class="flex-1 w-full h-full"></iframe>
  </div>

  <footer class="text-center py-2 border-t border-gray-200 bg-white shrink-0">
    <button onclick="resetData()" class="text-xs text-gray-400 hover:text-red-600 underline transition-colors">รีเซ็ตข้อมูลตัวอย่างทั้งหมด (Reset Demo Data)</button>
  </footer>
</div>

<script src="shared.js"></script>
<script>
function setActiveMenu(pageKey) {
  document.querySelectorAll(".menu-link").forEach((el) => {
    const on = el.dataset.page === pageKey;
    if (on) {
      el.classList.add("bg-teal-50", "text-teal-700", "font-semibold", "border-r-4", "border-teal-600");
      el.classList.remove("text-gray-600", "hover:bg-gray-50");
    } else {
      el.classList.remove("bg-teal-50", "text-teal-700", "font-semibold", "border-r-4", "border-teal-600");
      el.classList.add("text-gray-600", "hover:bg-gray-50");
    }
  });
}
window.addEventListener("message", (ev) => {
  if (ev.data && ev.data.type === "m1-planning-page") setActiveMenu(ev.data.page);
});

function setRole(role) {
  localStorage.setItem("m1p_role", role);
  document.getElementById("roleSwitch").value = role;
  document.querySelectorAll("[data-roles]").forEach((el) => el.classList.toggle("hidden", !el.dataset.roles.split(",").includes(role)));
  const entry = { curriculum_officer: "page-master.html", scheduler: "page-master.html", faculty: "page-timetable.html", student: "page-timetable.html" };
  document.getElementById("main-frame").src = "pages/" + entry[role];
}

function resetData() { localStorage.clear(); location.reload(); }

setRole(localStorage.getItem("m1p_role") ?? "curriculum_officer");
</script>
</body>
</html>
