<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 Planning · สร้างกลุ่มเรียน (Section)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    .overflow-x-auto::-webkit-scrollbar { height: 8px; }
    .overflow-x-auto::-webkit-scrollbar-track { background: #f1f1f1; }
    .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">สร้างกลุ่มเรียน (Section)</h1>
  <a href="page-section-import.html" class="text-sm text-teal-700 hover:bg-teal-50 rounded-lg px-3 py-1.5 border border-teal-200 transition-colors flex items-center gap-1">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
    นำเข้าจากไฟล์แทน
  </a>
</div>
<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 max-w-3xl space-y-5">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">รายวิชา</label>
      <select id="sc-course" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm mt-1 focus:border-teal-500 outline-none bg-white"></select>
    </div>
    <!-- ═══ NEW: Multi-Select for Instructors ═══ -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        อาจารย์ผู้สอน (M3)
        <span class="text-xs font-normal text-gray-400 ml-1">(เลือกได้หลายคน)</span>
      </label>
      <div class="relative mt-1">
        <div id="sc-instructor-display" onclick="toggleInstructorDropdown(event)"
          class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm bg-white cursor-pointer min-h-[42px] flex flex-wrap gap-1 items-center focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none transition-all">
          <span id="sc-instructor-placeholder" class="text-gray-400 text-sm px-1">เลือกอาจารย์ผู้สอน...</span>
        </div>
        <div id="sc-instructor-dropdown" class="hidden absolute z-30 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-xl max-h-64 overflow-hidden">
          <div class="p-2 border-b border-gray-100 bg-gray-50">
            <input id="sc-instructor-search" type="text" placeholder="🔍 ค้นหาอาจารย์..."
              class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm outline-none focus:border-teal-500 bg-white"
              oninput="filterInstructors(this.value)" onclick="event.stopPropagation()">
          </div>
          <div id="sc-instructor-options" class="overflow-y-auto max-h-48"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">ห้องเรียน</label>
      <select id="sc-room" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm mt-1 focus:border-teal-500 outline-none bg-white"></select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Timeslot</label>
      <select id="sc-timeslot" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm mt-1 focus:border-teal-500 outline-none bg-white"></select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">รูปแบบการเรียน</label>
      <select id="sc-mode" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm mt-1 focus:border-teal-500 outline-none bg-white">
        <option value="ONSITE">Onsite</option><option value="ONLINE">Online</option><option value="HYBRID">Hybrid</option>
      </select>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-gray-100">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">โควตารวม (UC-B4)</label>
      <input id="sc-quota" type="number" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm mt-1 focus:border-teal-500 outline-none" placeholder="จำนวนคน">
    </div>
    <div class="flex items-center pb-2">
      <label class="text-sm flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" id="sc-cross" class="w-4 h-4 text-teal-600 rounded border-gray-300 focus:ring-teal-500">
        <span class="text-gray-600">เปิดลงทะเบียนข้ามสาขา (UC-B5)</span>
      </label>
    </div>
  </div>

  <div id="sc-conflict-box" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
    <p class="text-xs text-red-600 font-semibold flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      ตรวจพบความขัดแย้ง (Conflict):
    </p>
    <p id="sc-conflict-msg" class="text-xs text-red-600 mt-1 pl-6"></p>
  </div>

  <div class="pt-4 flex justify-end">
    <button onclick="saveSectionCreate()" class="bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold rounded-xl px-6 py-2.5 shadow-md transition-transform active:scale-95">บันทึก Section</button>
  </div>
</div>

<div class="mt-8">
  <h2 class="text-lg font-bold text-gray-700 mb-3">รายการ Section ที่สร้างแล้ว</h2>
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden max-w-5xl">
    <table class="w-full text-sm"><thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500"><tr><th class="text-left px-4 py-3">รหัส Section</th><th class="text-left px-4 py-3">วิชา</th><th class="text-left px-4 py-3">อาจารย์ผู้สอน</th><th class="text-left px-4 py-3">ห้อง/เวลา</th><th class="text-left px-4 py-3">สถานะ</th></tr></thead><tbody id="section-rows"></tbody></table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let rooms = loadData("m1p_rooms", seedRooms);
let timeslots = loadData("m1p_timeslots", seedTimeslots);
let sections = loadData("m1p_sections", seedSections);

// ═══ Multi-Select State ═══
let selectedInstructors = [];

/* ═══ Multi-Select Instructor Logic ═══ */
function toggleInstructorDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById("sc-instructor-dropdown");
  dd.classList.toggle("hidden");
  if (!dd.classList.contains("hidden")) {
    document.getElementById("sc-instructor-search").focus();
    renderInstructorOptions("");
  }
}

function renderInstructorOptions(filter = "") {
  const options = mockInstructors.filter(i =>
    i.name.toLowerCase().includes(filter.toLowerCase())
  );
  document.getElementById("sc-instructor-options").innerHTML = options.length
    ? options.map(i => `
      <label class="flex items-center gap-2 px-3 py-2 hover:bg-teal-50 cursor-pointer border-b border-gray-50 last:border-0">
        <input type="checkbox" value="${i.id}" ${selectedInstructors.includes(i.id) ? 'checked' : ''}
          onchange="toggleInstructor(${i.id})" class="w-4 h-4 rounded text-teal-600 border-gray-300 focus:ring-teal-500">
        <span class="text-sm text-gray-700">${i.name}</span>
        ${selectedInstructors.includes(i.id) ? '<span class="ml-auto text-xs text-teal-600 font-semibold">✓ เลือกแล้ว</span>' : ''}
      </label>
    `).join("")
    : '<p class="text-center text-sm text-gray-400 py-4">ไม่พบอาจารย์</p>';
}

function toggleInstructor(id) {
  if (selectedInstructors.includes(id)) {
    selectedInstructors = selectedInstructors.filter(x => x !== id);
  } else {
    selectedInstructors.push(id);
  }
  renderInstructorDisplay();
  renderInstructorOptions(document.getElementById("sc-instructor-search").value);
}

function renderInstructorDisplay() {
  const display = document.getElementById("sc-instructor-display");
  const placeholder = document.getElementById("sc-instructor-placeholder");

  // Remove existing tags
  display.querySelectorAll('.instructor-tag').forEach(t => t.remove());

  if (selectedInstructors.length === 0) {
    placeholder.classList.remove("hidden");
  } else {
    placeholder.classList.add("hidden");
    selectedInstructors.forEach(id => {
      const instr = mockInstructors.find(i => i.id === id);
      if (!instr) return;
      const tag = document.createElement("span");
      tag.className = "instructor-tag inline-flex items-center gap-1 bg-teal-100 text-teal-800 text-xs px-2 py-1 rounded-full font-medium";
      tag.innerHTML = `${instr.name} <button onclick="event.stopPropagation(); toggleInstructor(${id})" class="hover:text-red-600 font-bold ml-1 leading-none" title="ยกเลิก">×</button>`;
      display.appendChild(tag);
    });
  }
}

function filterInstructors(val) {
  renderInstructorOptions(val);
}

// Close dropdown when clicking outside
document.addEventListener("click", (e) => {
  const dropdown = document.getElementById("sc-instructor-dropdown");
  const display = document.getElementById("sc-instructor-display");
  if (dropdown && !dropdown.contains(e.target) && !display.contains(e.target)) {
    dropdown.classList.add("hidden");
  }
});

function saveSectionCreate() {
  const courseCode = document.getElementById("sc-course").value;
  const instructorIds = selectedInstructors.map(Number);
  const roomId = Number(document.getElementById("sc-room").value);
  const timeslotId = Number(document.getElementById("sc-timeslot").value);

  const errBox = document.getElementById("sc-conflict-box");
  const errMsg = document.getElementById("sc-conflict-msg");

  // Validation
  if (instructorIds.length === 0) {
    errMsg.innerHTML = "กรุณาเลือกอาจารย์ผู้สอนอย่างน้อย 1 ท่าน";
    errBox.classList.remove("hidden");
    return;
  }

  const conflicts = findConflicts(roomId, instructorIds, timeslotId, null);
  if (conflicts.length) {
    errMsg.innerHTML = conflicts.join("<br>");
    errBox.classList.remove("hidden");
    return;
  }
  errBox.classList.add("hidden");

  sections.push({
    id: Date.now(),
    courseCode,
    instructorIds, // array
    roomId,
    timeslotId,
    mode: document.getElementById("sc-mode").value,
    quotaTotal: Number(document.getElementById("sc-quota").value || 0),
    status: "DRAFT",
    cross: document.getElementById("sc-cross").checked,
    sec: sections.filter(s => s.courseCode === courseCode).length + 1
  });
  saveData("m1p_sections", sections);

  // Reset form
  selectedInstructors = [];
  renderInstructorDisplay();

  alert("บันทึก Section แล้ว (สถานะ: Draft)");
  render();
}

function render() {
  // Section form options
  document.getElementById("sc-course").innerHTML = mockCourses.map((c) => `<option value="${c.code}">${c.code} — ${c.name}</option>`).join("");
  document.getElementById("sc-room").innerHTML = rooms.map((r) => `<option value="${r.id}">${r.code} (${r.building})</option>`).join("");
  document.getElementById("sc-timeslot").innerHTML = timeslots.map((t) => `<option value="${t.id}">${t.day} ${t.start}-${t.end}</option>`).join("");

  // Render instructor options (for multi-select)
  renderInstructorOptions("");
  renderInstructorDisplay();

  const STATUS_BADGE = { DRAFT: "bg-gray-100 text-gray-500", PUBLISHED: "bg-green-100 text-green-700", CLOSED: "bg-red-100 text-red-700" };

  // Section list — แสดงอาจารย์หลายคน
  let secRows = "";
  sections.forEach((s) => {
      const room = rooms.find((r) => r.id === s.roomId);
      const ts = timeslots.find((t) => t.id === s.timeslotId);
      const instrIds = getInstructorIds(s);
      const instrNames = instrIds.map(id => mockInstructors.find(i => i.id === id)?.name).filter(Boolean);
      const instrDisplay = instrNames.length > 0
        ? instrNames.map(n => `<span class="inline-block bg-purple-50 text-purple-700 text-[10px] px-1.5 py-0.5 rounded mr-1 mb-0.5 border border-purple-100">${n}</span>`).join("")
        : '<span class="text-gray-400 text-xs">-</span>';

      secRows += `<tr class="border-t border-gray-100 hover:bg-gray-50">
        <td class="px-4 py-3 font-mono text-xs">${s.courseCode} Sec${s.sec}</td>
        <td class="px-4 py-3 font-medium">${mockCourses.find(c=>c.code===s.courseCode)?.name || s.courseCode}</td>
        <td class="px-4 py-3">${instrDisplay}</td>
        <td class="px-4 py-3 text-gray-500 text-xs">${room?.code ?? "-"} · ${ts?.day ?? ""} ${ts?.start ?? ""}</td>
        <td class="px-4 py-3"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-semibold ${STATUS_BADGE[s.status]}">${s.status}</span></td></tr>`;
  });
  document.getElementById("section-rows").innerHTML = secRows || `<tr><td colspan="5" class="text-center text-gray-400 py-4 text-sm">ยังไม่มีข้อมูล</td></tr>`;
}

function init() { render(); notifyParentPage("section-create"); }
</script>
</body>
</html>
