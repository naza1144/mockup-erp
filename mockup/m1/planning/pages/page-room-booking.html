<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 Planning · จองห้องสำหรับกิจกรรมพิเศษ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<h1 class="text-2xl font-bold mb-6 text-gray-800">จองห้องสำหรับกิจกรรมพิเศษ</h1>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-2">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
      <h3 class="text-lg font-bold text-gray-700 mb-2">ค้นหาห้องว่าง</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">วันที่</label><input id="rb-date" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-teal-500 outline-none"></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">เวลาเริ่ม</label><input id="rb-start" type="time" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-teal-500 outline-none"></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">เวลาสิ้นสุด</label><input id="rb-end" type="time" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-teal-500 outline-none"></div>
      </div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1">ความจุที่ต้องการ (คน)</label><input id="rb-capacity" type="number" class="w-full max-w-[140px] border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-teal-500 outline-none"></div>
      <button onclick="checkRoomAvailability()" class="w-full md:w-auto bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold rounded-xl px-6 py-2.5 shadow-sm transition-transform active:scale-95">ตรวจสอบห้องว่าง</button>
      <div id="rb-available" class="space-y-2 mt-4 pt-4 border-t border-gray-100"></div>
    </div>
  </div>
  <div class="lg:col-span-1">
     <div id="rb-mine" class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 h-full">
       <h3 class="text-sm font-bold text-gray-700 mb-3">การจองของฉัน</h3>
       <div class="text-sm text-gray-400 text-center py-10">ยังไม่มีรายการจอง</div>
     </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let rooms = loadData("m1p_rooms", seedRooms);
let roomBookings = loadData("m1p_bookings", []);

/* ═══ UC-B10/B11 — จองห้อง ═══ */
function checkRoomAvailability() {
  const cap = Number(document.getElementById("rb-capacity").value || 0);
  const availableRooms = rooms.filter((r) => r.status === "AVAILABLE" && r.capacity >= cap);

  document.getElementById("rb-available").innerHTML = availableRooms.length
    ? availableRooms.map((r) => `<div class="flex items-center justify-between border border-gray-200 rounded-lg px-4 py-3 hover:bg-gray-50 transition-colors">
        <div>
            <span class="text-sm font-bold text-gray-700 block">${r.code}</span>
            <span class="text-xs text-gray-500">${r.building} (จุ ${r.capacity} คน)</span>
        </div>
        <button onclick="bookRoom(${r.id})" class="bg-teal-100 text-teal-700 hover:bg-teal-200 rounded-lg px-3 py-1.5 text-xs font-semibold transition-colors">จองเลย</button>
    </div>`).join("")
    : `<p class="text-sm text-amber-600 bg-amber-50 p-3 rounded-lg border border-amber-100">ไม่มีห้องว่างตรงเงื่อนไข (Alternative Flow UC-B10)</p>`;
}

function bookRoom(roomId) {
  const date = document.getElementById("rb-date").value, start = document.getElementById("rb-start").value, end = document.getElementById("rb-end").value;
  if (!date || !start || !end) { alert("กรอกวันที่และเวลาให้ครบก่อนจอง"); return; }
  if (Math.random() < 0.2) { alert("ห้องนี้เพิ่งถูกจองไปแล้วโดยคำขออื่น — กรุณาเลือกห้องใหม่"); checkRoomAvailability(); return; }
  const reason = prompt("ระบุเหตุผล/กิจกรรม:", "ประชุมภาควิชา"); if (reason === null) return;
  roomBookings.push({ id: Date.now(), roomId, date, start, end, reason, status: "CONFIRMED", source: "PLANNING" });
  saveData("m1p_bookings", roomBookings);
  alert("จองห้องสำเร็จ"); render();
}

function render() {
  document.getElementById("rb-mine").innerHTML = roomBookings.length
    ? `<div class="space-y-2">` + roomBookings.map((b) => `<div class="bg-gray-50 rounded-lg p-3 border border-gray-100">
        <p class="text-sm font-bold text-gray-700">${rooms.find((r) => r.id === b.roomId)?.code}</p>
        <p class="text-xs text-gray-500">${b.date} ${b.start}-${b.end}</p>
        <p class="text-xs text-gray-400 mt-1 italic">"${b.reason}"</p>
    </div>`).join("") + `</div>` : "<p class='text-sm text-gray-400 text-center py-4'>ยังไม่มีรายการจอง</p>";
}

function init() { render(); notifyParentPage("room-booking"); }
</script>
</body>
</html>
