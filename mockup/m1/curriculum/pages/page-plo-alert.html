<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · แจ้งเตือน PLO ต่ำกว่าเกณฑ์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 22. PLO Alert — UC-A29 ═══ -->
<div>
  <a href="page-attainment.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">แจ้งเตือน PLO ต่ำกว่าเกณฑ์ (UC-A29)</h1>
  <div id="pa-list" class="space-y-3"></div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
let ploAttainment = loadData("m1c_plo_attainment", seedPloAttainment);
const pid = Number(new URLSearchParams(location.search).get("pid")) || programs[0].id;
let curProgram = programs.find((p) => p.id === pid) || programs[0];

function renderPloAlert() {
  const alerts = (curProgram.plos || []).filter((plo) => { const d = ploAttainment[plo.plo_id]?.["2569"]; return d && !d.pass; });
  document.getElementById("pa-list").innerHTML = alerts.length
    ? alerts.map((plo) => { const d = ploAttainment[plo.plo_id]?.["2569"]; return `<div class="bg-red-50 border border-red-200 rounded-xl p-4 flex items-center justify-between"><div><p class="text-sm font-semibold text-red-800">${plo.code}</p><p class="text-xs text-red-600">${Math.round(d.score*100)}% ต่ำกว่าเกณฑ์</p></div><button onclick="alert('แจ้งเตือน (จำลอง)')" class="text-red-700 border border-red-300 rounded-lg px-3 py-1 text-xs">แจ้งเตือน</button></div>`; }).join("")
    : '<p class="text-sm text-green-700 bg-green-50 rounded-xl p-4">PLO ทั้งหมดผ่านเกณฑ์</p>';
}

function init() { renderPloAlert(); notifyParentPage("plo-alert"); }
</script>
</body>
</html>
