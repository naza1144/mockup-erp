<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · พิจารณาอนุมัติหลักสูตร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 4. Curriculum Approval — UC-A5 ═══ -->
<div>
  <a href="page-programs.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับรายการหลักสูตร</a>
  <h1 class="text-2xl font-bold mb-4">พิจารณาอนุมัติหลักสูตร</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-lg space-y-3">
    <p class="text-sm">หลักสูตร: <span id="ap-title" class="font-semibold"></span></p>
    <p class="text-xs text-gray-500">สถานะปัจจุบัน: <span id="ap-status"></span></p>
    <div data-roles="reviewer" class="pt-3 border-t border-gray-100 space-x-2">
      <button onclick="approveProgram()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl px-4 py-2">อนุมัติ</button>
      <button onclick="rejectProgram()" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 text-sm font-semibold rounded-xl px-4 py-2">ตีกลับ</button>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
const pid = Number(new URLSearchParams(location.search).get("pid")) || programs[0].id;
let curProgram = programs.find((p) => p.id === pid) || programs[0];

function approveProgram() { curProgram.status = "ACTIVE"; saveData("m1c_programs", programs); alert("อนุมัติแล้ว"); location.href = "page-programs.html"; }
function rejectProgram() {
  const c = prompt("เหตุผล:"); if (c === null) return;
  curProgram.status = "DRAFT"; saveData("m1c_programs", programs);
  alert("ตีกลับแล้ว"); location.href = "page-program-edit.html?pid=" + curProgram.id;
}

function render() {
  document.getElementById("ap-title").textContent = curProgram.name_th;
  document.getElementById("ap-status").textContent = STATUS_TH[curProgram.status];
}

function init() { render(); applyRoleGating(); notifyParentPage("approve-program"); }
</script>
</body>
</html>
