<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · Dashboard PLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 20. PLO Dashboard — UC-A27 ═══ -->
<div>
  <a href="page-attainment.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">Dashboard PLO (UC-A27)</h1>
  <div class="grid grid-cols-2 gap-4 mb-4">
    <div><label class="text-sm font-semibold text-gray-700">ปีการศึกษา</label>
      <select id="pd-year" onchange="renderPloDashboard()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
        <option value="2569">2569</option><option value="2568">2568</option><option value="2567">2567</option>
      </select></div>
    <div><label class="text-sm font-semibold text-gray-700">รุ่น</label>
      <select id="pd-cohort" onchange="renderPloDashboard()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
        <option value="all">ทุกรุ่น</option><option value="2568">2568</option><option value="2567">2567</option>
      </select></div>
  </div>
  <div id="pd-chart" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 space-y-3"></div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
let ploAttainment = loadData("m1c_plo_attainment", seedPloAttainment);
const pid = Number(new URLSearchParams(location.search).get("pid")) || programs[0].id;
let curProgram = programs.find((p) => p.id === pid) || programs[0];

function renderPloDashboard() {
  document.getElementById("pd-chart").innerHTML = (curProgram.plos || []).map((plo) => {
    const d = ploAttainment[plo.plo_id]?.[document.getElementById("pd-year").value]; const pct = d ? Math.round(d.score*100) : 0;
    const pass = d?.pass;
    return `<div class="flex items-center justify-between border-b border-gray-100 pb-2"><p class="text-sm font-semibold">${plo.code}</p>
      <div class="flex items-center gap-3"><div class="w-48 bg-gray-200 rounded-full h-4"><div class="${pass ? "bg-green-500" : "bg-red-500"} h-4 rounded-full" style="width:${pct}%"></div></div>
        <span class="text-sm font-bold ${pass ? "text-green-700" : "text-red-600"}">${pct}%</span>
        <span class="text-xs ${pass ? "text-green-600" : "text-red-600"}">${pass ? "✔" : "✘"}</span></div></div>`;
  }).join("");
}

function init() { renderPloDashboard(); notifyParentPage("plo-dashboard"); }
</script>
</body>
</html>
