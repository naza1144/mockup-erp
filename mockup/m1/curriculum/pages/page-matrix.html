<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · Matrix การจับคู่ PLO-CLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 10. PLO-CLO Matrix — UC-A12 ═══ -->
<div>
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold">Matrix การจับคู่ PLO-CLO</h1>
    <div class="space-x-2">
      <a id="coverage-link" href="page-coverage.html" class="text-sm text-violet-700 hover:bg-violet-50 rounded-lg px-3 py-1.5 border border-violet-200">ตรวจสอบความครอบคลุม</a>
      <button onclick="alert('Export ตาราง Mapping เป็น Excel (จำลอง)')" class="text-sm text-violet-700 hover:bg-violet-50 rounded-lg px-3 py-1.5 border border-violet-200">ส่งออกตาราง</button>
    </div>
  </div>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-x-auto">
    <table class="text-sm" id="matrix-table"></table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
let courses = loadData("m1c_courses", seedCourses);
let mapping = loadData("m1c_mapping", seedMapping);
const pid = Number(new URLSearchParams(location.search).get("pid")) || programs[0].id;
let curProgram = programs.find((p) => p.id === pid) || programs[0];

function cycleLevel(ploId, cloId) {
  const cur = mapping.find((m) => m.plo === ploId && m.clo === cloId);
  const curLevel = cur ? cur.level : "-";
  const next = LEVEL_CYCLE[(LEVEL_CYCLE.indexOf(curLevel) + 1) % LEVEL_CYCLE.length];
  if (cur) { if (next === "-") mapping = mapping.filter((m) => m !== cur); else cur.level = next; }
  else if (next !== "-") mapping.push({ plo: ploId, clo: cloId, level: next });
  saveData("m1c_mapping", mapping); render();
}

function render() {
  const allClos = courses.flatMap((c) => (c.clos || []));
  document.getElementById("matrix-table").innerHTML = `<thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500"><tr><th class="text-left px-3 py-2">PLO</th>${allClos.map((c) => `<th class="px-3 py-2">${c.code}</th>`).join("")}</tr></thead>
    <tbody>${(curProgram.plos || []).map((p) => `<tr class="border-t border-gray-100"><td class="px-3 py-2 text-left font-semibold">${p.code}</td>
      ${allClos.map((c) => { const m = mapping.find(x => x.plo === p.plo_id && x.clo === c.clo_id); const lvl = m ? m.level : "-"; return `<td class="px-1 py-1"><button onclick="cycleLevel(${p.plo_id},${c.clo_id})" class="w-9 h-9 rounded ${LEVEL_COLOR[lvl]} font-semibold text-xs">${lvl}</button></td>`; }).join("")}</tr>`).join("")}</tbody>`;
}

function init() {
  document.getElementById("coverage-link").href = "page-coverage.html?pid=" + curProgram.id;
  render();
  notifyParentPage("matrix");
}
</script>
</body>
</html>
