<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · ตรวจสอบความครอบคลุม PLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 11. Coverage Check — UC-A13 ═══ -->
<div>
  <a id="back-link" href="#" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับไปหน้า Matrix</a>
  <h1 class="text-2xl font-bold mb-4">ตรวจสอบความครอบคลุม PLO</h1>
  <div id="coverage-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
let courses = loadData("m1c_courses", seedCourses);
let mapping = loadData("m1c_mapping", seedMapping);
const pid = Number(new URLSearchParams(location.search).get("pid")) || programs[0].id;
let curProgram = programs.find((p) => p.id === pid) || programs[0];

function computeCoverage() {
  return (curProgram.plos || []).map((plo) => ({
    plo, hasMaster: mapping.some((m) => m.plo === plo.plo_id && m.level === "M"),
    hasAny: mapping.some((m) => m.plo === plo.plo_id)
  }));
}

function render() {
  document.getElementById("coverage-list").innerHTML = computeCoverage().map((c) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 flex items-center justify-between">
      <p class="text-sm">${c.plo.code} — ${c.plo.description}</p>
      ${c.hasMaster ? '<span class="text-green-700 text-xs font-semibold">✔ ครอบคลุม</span>' : '<span class="text-amber-600 text-xs font-semibold">⚠ ยังไม่มี Master</span>'}</div>`).join("");
}

function init() {
  document.getElementById("back-link").href = "page-matrix.html?pid=" + curProgram.id;
  render();
  notifyParentPage("coverage");
}
</script>
</body>
</html>
