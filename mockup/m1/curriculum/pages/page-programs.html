<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · รายการหลักสูตร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 1. Program List ═══ -->
<div>
  <div class="flex items-center justify-between mb-4">
    <div><h1 class="text-2xl font-bold">รายการหลักสูตร</h1><p class="text-xs text-gray-500"><span id="pg-count"></span> หลักสูตร</p></div>
    <a href="page-program-edit.html" class="bg-violet-600 hover:bg-violet-700 text-white text-sm font-semibold rounded-xl px-4 py-2">＋ สร้างหลักสูตรใหม่</a>
  </div>
  <div class="bg-white rounded-2xl border border-gray-300 shadow-md overflow-hidden">
    <table class="w-full text-sm border-collapse">
      <thead>
        <tr class="bg-gray-200 text-xs uppercase tracking-wider text-gray-700 border-b-2 border-gray-400">
          <th class="text-left px-4 py-3 border-r border-gray-300">รหัส</th>
          <th class="text-left px-4 py-3 border-r border-gray-300">ชื่อหลักสูตร</th>
          <th class="text-left px-4 py-3 border-r border-gray-300">ระดับ</th>
          <th class="text-left px-4 py-3 border-r border-gray-300">สถานะ</th>
          <th class="text-left px-4 py-3"></th>
        </tr>
      </thead>
      <tbody id="pg-rows"></tbody>
    </table>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);

function render() {
  document.getElementById("pg-count").textContent = programs.length;
  document.getElementById("pg-rows").innerHTML = programs.map((p) => `
    <tr class="border-t border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-3 font-mono">${p.program_code}</td><td class="px-4 py-3">${p.name_th}</td>
      <td class="px-4 py-3 text-gray-500">${LEVEL_TH[p.level] || p.level}</td>
      <td class="px-4 py-3"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-semibold ${STATUS_BADGE[p.status]}">${STATUS_TH[p.status]}</span></td>
      <td class="px-4 py-3 text-right space-x-1">
        <a href="page-program-edit.html?pid=${p.id}" class="text-violet-700 hover:bg-violet-50 rounded-lg px-2 py-1 text-xs">แก้ไข</a>
        ${p.status === "IN_REVIEW" ? `<a href="page-approve-program.html?pid=${p.id}" class="text-amber-700 hover:bg-amber-50 rounded-lg px-2 py-1 text-xs">พิจารณา</a>` : ""}
      </td></tr>`).join("");
}

function init() { render(); notifyParentPage("programs"); }
</script>
</body>
</html>
