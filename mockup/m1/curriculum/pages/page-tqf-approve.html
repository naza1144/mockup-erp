<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · อนุมัติเอกสาร TQF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 16. TQF Document Approval — UC-A20 ═══ -->
<div>
  <a href="page-programs.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">อนุมัติเอกสาร TQF</h1>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-lg space-y-3">
    <p class="text-sm">เอกสาร: <span id="ta-title" class="font-semibold"></span></p>
    <div data-roles="reviewer" class="pt-3 border-t border-gray-100 space-x-2">
      <button onclick="approveDoc()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl px-4 py-2">อนุมัติ</button>
      <button onclick="rejectDoc()" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 text-sm font-semibold rounded-xl px-4 py-2">ตีกลับ</button>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
let courses = loadData("m1c_courses", seedCourses);
let docs = loadData("m1c_docs", seedDocs);
const qs = new URLSearchParams(location.search);
const curDocType = qs.get("type");
const src = qs.get("src");
const pid = qs.get("pid");
const cid = qs.get("cid");
const curProgram = pid ? programs.find((p) => p.id === Number(pid)) : null;
const curCourse = cid ? courses.find((c) => c.course_id === Number(cid)) : null;

function approveDoc() { docs[curDocType].status = "APPROVED"; saveData("m1c_docs", docs); alert("อนุมัติแล้ว"); location.href = "page-programs.html"; }
function rejectDoc() {
  const c = prompt("เหตุผล:"); if (c === null) return;
  docs[curDocType].status = "DRAFT"; docs[curDocType].comment = c; saveData("m1c_docs", docs);
  alert("ตีกลับแล้ว");
  let url = "page-preview-export.html?type=" + curDocType + "&src=" + src;
  if (pid) url += "&pid=" + pid;
  if (cid) url += "&cid=" + cid;
  location.href = url;
}

function render() {
  document.getElementById("ta-title").textContent = curDocType + (curCourse ? " — " + curCourse.code : " — " + (curProgram?.name_th || ""));
}

function init() { render(); applyRoleGating(); notifyParentPage("tqf-approve"); }
</script>
</body>
</html>
