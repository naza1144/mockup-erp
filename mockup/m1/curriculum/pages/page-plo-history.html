<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · ประวัติการแก้ไข PLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 6. PLO History — UC-A7 ═══ -->
<div>
  <a id="back-link" href="#" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">ประวัติการแก้ไข PLO</h1>
  <div id="plo-history-list" class="space-y-2"></div>
</div>

<script src="../shared.js"></script>
<script>
let programs = loadData("m1c_programs", seedPrograms);
const pid = Number(new URLSearchParams(location.search).get("pid")) || programs[0].id;
let curProgram = programs.find((p) => p.id === pid) || programs[0];

function render() {
  document.getElementById("plo-history-list").innerHTML = (curProgram.plo_history || []).map((h) => `
    <div class="bg-white rounded-xl border border-gray-200 p-3 text-sm"><p class="font-semibold">${h.changed_at} · ${h.changed_by}</p><p class="text-xs text-gray-400">${h.before} → ${h.after}</p><p class="text-xs text-gray-400">เหตุผล: ${h.reason}</p></div>`).join("") || '<p class="text-sm text-gray-400">ไม่มีประวัติ</p>';
}

function init() {
  document.getElementById("back-link").href = "page-plo.html?pid=" + curProgram.id;
  render();
  notifyParentPage("plo-history");
}
</script>
</body>
</html>
