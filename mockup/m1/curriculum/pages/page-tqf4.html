<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1 หลักสูตร · สร้างเอกสาร มคอ.4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans Thai', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6" onload="init()">

<!-- ═══ 14. Generate มคอ.4 (สหกิจ) — UC-A18 ═══ -->
<div>
  <a href="page-courses.html" class="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block">← กลับ</a>
  <h1 class="text-2xl font-bold mb-4">สร้างเอกสาร มคอ.4 (สหกิจ)</h1>
  <div id="tqf4-placement-note" class="mb-4 bg-gray-50 border border-gray-200 text-gray-600 text-sm rounded-xl px-4 py-3"></div>
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 max-w-2xl space-y-3">
    <div><label class="text-sm font-semibold text-gray-700">วัตถุประสงค์</label><textarea id="tqf4-objectives" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></textarea></div>
    <div><label class="text-sm font-semibold text-gray-700">เนื้อหาการฝึกประสบการณ์</label><textarea id="tqf4-content" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"></textarea></div>
    <button onclick="saveDraftDoc()" class="bg-violet-600 hover:bg-violet-700 text-white text-sm font-semibold rounded-xl px-4 py-2">บันทึกร่าง & Preview</button>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let courses = loadData("m1c_courses", seedCourses);
let docs = loadData("m1c_docs", seedDocs);
const cid = Number(new URLSearchParams(location.search).get("cid")) || courses[0].course_id;
let curCourse = courses.find((c) => c.course_id === cid) || courses[0];

function saveDraftDoc() {
  docs.TQF4 = { status: "DRAFT", content: {
    objectives: document.getElementById("tqf4-objectives")?.value,
    content: document.getElementById("tqf4-content")?.value,
  } };
  saveData("m1c_docs", docs);
  location.href = "page-preview-export.html?type=TQF4&src=tqf4&cid=" + curCourse.course_id;
}

function render() {
  const placementNote = document.getElementById("tqf4-placement-note");
  placementNote.textContent = Math.random() > 0.5 ? "พบข้อมูลจาก M8 · Co-op" : "ไม่พบ placement — กรอกเอง";
  if (docs.TQF4?.content) {
    document.getElementById("tqf4-objectives").value = docs.TQF4.content.objectives || "";
    document.getElementById("tqf4-content").value = docs.TQF4.content.content || "";
  }
}

function init() { render(); notifyParentPage("tqf4"); }
</script>
</body>
</html>
